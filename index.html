F1o fue aprobada la Constituci\xF3n Espa\xF1ola y en qu\xE9 t\xEDtulo se recogen los valores superiores del ordenamiento jur\xEDdico?",opciones:["1978, T\xEDtulo Preliminar","1975, T\xEDtulo I","1981, T\xEDtulo II","1978, T\xEDtulo VIII"],correcta:0,explicacion:"La Constituci\xF3n de 1978 recoge en su T\xEDtulo Preliminar (art. 1) los valores superiores: libertad, igualdad, justicia y pluralismo pol\xEDtico."},{temaId:3,pregunta:"\xBFQu\xE9 \xF3rgano constitucional ejerce la potestad legislativa del Estado seg\xFAn la Constituci\xF3n?",opciones:["El Gobierno","El Rey","Las Cortes Generales","El Tribunal Constitucional"],correcta:2,explicacion:"Las Cortes Generales (Congreso y Senado) representan al pueblo espa\xF1ol y ejercen la potestad legislativa del Estado."},{temaId:4,pregunta:"\xBFQu\xE9 instituci\xF3n de la Uni\xF3n Europea representa los intereses generales de la UE y tiene la iniciativa legislativa?",opciones:["El Consejo Europeo","La Comisi\xF3n Europea","El Tribunal de Cuentas","El Banco Central Europeo"],correcta:1,explicacion:"La Comisi\xF3n Europea representa el inter\xE9s general de la UE y es, con car\xE1cter general, la \xFAnica instituci\xF3n con iniciativa legislativa."},{temaId:5,pregunta:"\xBFQu\xE9 ley regula el funcionamiento del sector p\xFAblico estatal en Espa\xF1a?",opciones:["Ley 39/2015","Ley 40/2015, de R\xE9gimen Jur\xEDdico del Sector P\xFAblico","Ley Org\xE1nica 3/2007","Ley 19/2013"],correcta:1,explicacion:"La Ley 40/2015, de R\xE9gimen Jur\xEDdico del Sector P\xFAblico, regula la organizaci\xF3n y funcionamiento de la Administraci\xF3n General del Estado."},{temaId:6,pregunta:"\xBFQu\xE9 norma constituye el Estatuto B\xE1sico del Empleado P\xFAblico?",opciones:["Real Decreto Legislativo 5/2015","Ley 7/2007","Ley 30/1984","Ambas, a) y b), han sido su origen normativo"],correcta:3,explicacion:"El Estatuto B\xE1sico se aprob\xF3 por Ley 7/2007 y su texto refundido vigente es el Real Decreto Legislativo 5/2015."},{temaId:7,pregunta:"\xBFDe qu\xE9 \xF3rgano depende jer\xE1rquicamente la Secretar\xEDa de Estado de Seguridad?",opciones:["Ministerio de Defensa","Ministerio del Interior","Ministerio de Justicia","Presidencia del Gobierno"],correcta:1,explicacion:"La Secretar\xEDa de Estado de Seguridad se integra en la estructura org\xE1nica b\xE1sica del Ministerio del Interior."},{temaId:8,pregunta:"\xBFQu\xE9 \xF3rgano ostenta la jefatura superior de la Polic\xEDa Nacional?",opciones:["El Secretario de Estado de Seguridad","El Director General de la Polic\xEDa","El Ministro del Interior","El Delegado del Gobierno"],correcta:1,explicacion:"La Direcci\xF3n General de la Polic\xEDa, con su Director General al frente, ejerce la jefatura superior de la Polic\xEDa Nacional."},{temaId:9,pregunta:"Seg\xFAn la LO 2/1986, \xBFqu\xE9 principio b\xE1sico de actuaci\xF3n exige a los miembros de las FCS actuar con la decisi\xF3n necesaria, sin demora, cuando de ello dependa evitar un da\xF1o grave?",opciones:["Principio de congruencia","Principio de oportunidad","Principio de dedicaci\xF3n profesional","Principio de proporcionalidad"],correcta:1,explicacion:"El principio de oportunidad obliga a actuar con decisi\xF3n, sin demora ni retraso injustificado, cuando de ello dependa evitar un da\xF1o grave, inmediato e irreparable."},{temaId:10,pregunta:"\xBFQu\xE9 norma regula la entrada, libre circulaci\xF3n y residencia en Espa\xF1a de ciudadanos de los Estados miembros de la UE?",opciones:["LO 4/2000","Real Decreto 240/2007","Ley 12/2009","Ley 5/2014"],correcta:1,explicacion:"El Real Decreto 240/2007 regula las condiciones para el ejercicio del derecho de libre circulaci\xF3n y residencia de ciudadanos de la UE y del EEE."},{temaId:11,pregunta:"\xBFQu\xE9 ley org\xE1nica regula los derechos y libertades de los extranjeros en Espa\xF1a y su r\xE9gimen sancionador?",opciones:["LO 4/2000","LO 2/1986","LO 4/2015","LO 1/2004"],correcta:0,explicacion:"La LO 4/2000, sobre derechos y libertades de los extranjeros en Espa\xF1a, regula tambi\xE9n el r\xE9gimen de infracciones y sanciones en materia de extranjer\xEDa."},{temaId:12,pregunta:"\xBFQu\xE9 ley regula el derecho de asilo y la protecci\xF3n subsidiaria en Espa\xF1a?",opciones:["Ley 12/2009","Ley 4/2000","Ley 5/2014","Ley 39/2015"],correcta:0,explicacion:"La Ley 12/2009 regula el derecho de asilo y la protecci\xF3n subsidiaria en Espa\xF1a."},{temaId:13,pregunta:"\xBFQu\xE9 ley regula actualmente la Seguridad Privada en Espa\xF1a?",opciones:["Ley 23/1992","Ley 5/2014","Ley 4/2015","Ley 2/1986"],correcta:1,explicacion:"La Ley 5/2014, de Seguridad Privada, sustituy\xF3 a la anterior Ley 23/1992 y regula el sector en la actualidad."},{temaId:14,pregunta:"\xBFQu\xE9 ley org\xE1nica regula la protecci\xF3n de la seguridad ciudadana desde 2015?",opciones:["LO 1/1992","LO 4/2015","LO 2/1986","LO 4/2000"],correcta:1,explicacion:"La LO 4/2015, de protecci\xF3n de la seguridad ciudadana, sustituy\xF3 a la conocida como 'ley de seguridad ciudadana' de 1992."},{temaId:15,pregunta:"\xBFQu\xE9 ley establece el sistema de protecci\xF3n de infraestructuras cr\xEDticas en Espa\xF1a?",opciones:["Ley 8/2011","Ley 5/2014","Ley 36/2015","Ley 40/2015"],correcta:0,explicacion:"La Ley 8/2011 establece las medidas para la protecci\xF3n de las infraestructuras cr\xEDticas frente a amenazas."},{temaId:16,pregunta:"En Derecho Penal, \xBFqu\xE9 se entiende por delito seg\xFAn el concepto material?",opciones:["Toda conducta contraria a la moral","Toda acci\xF3n u omisi\xF3n t\xEDpica, antijur\xEDdica y culpable","Cualquier infracci\xF3n administrativa grave","Un acto exclusivamente doloso"],correcta:1,explicacion:"El concepto material de delito exige que la conducta sea t\xEDpica (prevista en la ley), antijur\xEDdica y culpable."},{temaId:17,pregunta:"\xBFC\xF3mo se denomina el delito consistente en causar la muerte de otra persona sin las circunstancias del asesinato?",opciones:["Homicidio","Asesinato","Lesiones","Inducci\xF3n al suicidio"],correcta:0,explicacion:"El homicidio es el tipo b\xE1sico de causar la muerte a otro, regulado en el C\xF3digo Penal de forma diferenciada del asesinato."},{temaId:18,pregunta:"\xBFQu\xE9 diferencia principal existe entre hurto y robo en el C\xF3digo Penal?",opciones:["No hay diferencia, son sin\xF3nimos","El robo emplea fuerza en las cosas o violencia/intimidaci\xF3n en las personas; el hurto no","El hurto siempre es m\xE1s grave","El robo solo se aplica a bienes muebles"],correcta:1,explicacion:"El robo se caracteriza por el empleo de fuerza en las cosas o violencia/intimidaci\xF3n en las personas, ausentes en el hurto."},{temaId:19,pregunta:"\xBFCu\xE1l de los siguientes es un delito contra el orden p\xFAblico seg\xFAn el C\xF3digo Penal?",opciones:["El allanamiento de morada","La sedici\xF3n impropia / des\xF3rdenes p\xFAblicos","El hurto de uso","La estafa"],correcta:1,explicacion:"Los des\xF3rdenes p\xFAblicos y figuras afines se encuadran dentro de los delitos contra el orden p\xFAblico."},{temaId:20,pregunta:"\xBFCu\xE1l de estas conductas se tipifica como delito inform\xE1tico?",opciones:["El acceso no autorizado a sistemas de informaci\xF3n","La compraventa online l\xEDcita","El uso de redes sociales","La firma electr\xF3nica"],correcta:0,explicacion:"El acceso e interceptaci\xF3n il\xEDcita a sistemas de informaci\xF3n constituye uno de los delitos inform\xE1ticos del C\xF3digo Penal."},{temaId:21,pregunta:"\xBFQu\xE9 principio rige el proceso penal espa\xF1ol respecto a la presunci\xF3n de inocencia?",opciones:["Se presume la culpabilidad hasta prueba en contrario","Toda persona se presume inocente hasta que se demuestre su culpabilidad por sentencia firme","Solo aplica en delitos leves","No est\xE1 reconocido en Espa\xF1a"],correcta:1,explicacion:"La presunci\xF3n de inocencia es un derecho fundamental (art. 24 CE) y principio esencial del Derecho Procesal Penal."},{temaId:22,pregunta:"\xBFQu\xE9 reconoce la Ley 4/2015 del Estatuto de la v\xEDctima del delito?",opciones:["Solo derechos econ\xF3micos","Un cat\xE1logo general de derechos, procesales y extraprocesales, de toda v\xEDctima de un delito","Derechos exclusivos para v\xEDctimas de terrorismo","Beneficios fiscales"],correcta:1,explicacion:"La Ley 4/2015 reconoce un cat\xE1logo de derechos comunes a todas las v\xEDctimas de delitos, con independencia del tipo de infracci\xF3n."},{temaId:23,pregunta:"\xBFQu\xE9 ley org\xE1nica establece medidas de protecci\xF3n integral contra la violencia de g\xE9nero en Espa\xF1a?",opciones:["LO 1/2004","LO 3/2007","LO 4/2015","LO 10/1995"],correcta:0,explicacion:"La LO 1/2004, de Medidas de Protecci\xF3n Integral contra la Violencia de G\xE9nero, es la norma de referencia en esta materia."},{temaId:24,pregunta:"\xBFQu\xE9 ley constituye el marco general de la Prevenci\xF3n de Riesgos Laborales en Espa\xF1a?",opciones:["Ley 31/1995","Ley 54/2003","Real Decreto 39/1997","Ley 20/2007"],correcta:0,explicacion:"La Ley 31/1995, de Prevenci\xF3n de Riesgos Laborales, es la norma b\xE1sica que establece el marco general en esta materia."},{temaId:25,pregunta:"\xBFQu\xE9 reglamento desarrolla los servicios de prevenci\xF3n previstos en la Ley 31/1995?",opciones:["RD 39/1997","RD 486/1997","RD 773/1997","RD 1215/1997"],correcta:0,explicacion:"El Real Decreto 39/1997 aprueba el Reglamento de los Servicios de Prevenci\xF3n, desarrollando la Ley 31/1995."},{temaId:26,pregunta:"\xBFQu\xE9 normativa europea regula con car\xE1cter general la protecci\xF3n de datos personales desde 2018?",opciones:["Directiva 95/46/CE","Reglamento General de Protecci\xF3n de Datos (RGPD)","LO 15/1999","Convenio 108"],correcta:1,explicacion:"El RGPD (Reglamento UE 2016/679), de aplicaci\xF3n desde mayo de 2018, es la norma de referencia, completada en Espa\xF1a por la LOPDGDD."},{temaId:27,pregunta:"\xBFEn qu\xE9 a\xF1o se proclam\xF3 la Declaraci\xF3n Universal de los Derechos Humanos?",opciones:["1945","1948","1950","1966"],correcta:1,explicacion:"La Declaraci\xF3n Universal de los Derechos Humanos fue proclamada por la Asamblea General de la ONU el 10 de diciembre de 1948."},{temaId:28,pregunta:"\xBFCu\xE1l de estos organismos se asocia hist\xF3ricamente al movimiento antiglobalizaci\xF3n?",opciones:["El Foro Social Mundial","El G7","El FMI","La OMC"],correcta:0,explicacion:"El Foro Social Mundial naci\xF3 como espacio alternativo a los foros econ\xF3micos globales, vinculado a movimientos antiglobalizaci\xF3n."},{temaId:29,pregunta:"\xBFQu\xE9 componente NO forma parte cl\xE1sicamente de una actitud social?",opciones:["Componente cognitivo","Componente afectivo","Componente conductual","Componente gen\xE9tico"],correcta:3,explicacion:"Las actitudes se componen cl\xE1sicamente de elementos cognitivos, afectivos y conductuales; el componente gen\xE9tico no forma parte de este modelo."},{temaId:30,pregunta:"\xBFQu\xE9 valor implica el respeto y la aceptaci\xF3n de formas de pensar, actuar o vivir distintas a las propias?",opciones:["Tolerancia","Fanatismo","Sectarismo","Dogmatismo"],correcta:0,explicacion:"La tolerancia es el principio \xE9tico que sustenta el respeto activo a la diversidad y a formas de vida distintas de la propia."},{temaId:31,pregunta:"\xBFC\xF3mo se denomina el proceso de incorporaci\xF3n efectiva de la poblaci\xF3n inmigrante a la sociedad de acogida?",opciones:["Asimilaci\xF3n forzosa","Integraci\xF3n social","Segregaci\xF3n","Guetizaci\xF3n"],correcta:1,explicacion:"La integraci\xF3n social es el factor esencial de cohesi\xF3n social frente a fen\xF3menos como la segregaci\xF3n o la exclusi\xF3n."},{temaId:32,pregunta:"\xBFQu\xE9 estudia la geograf\xEDa humana?",opciones:["El relieve y el clima","La relaci\xF3n entre las sociedades humanas y el espacio que ocupan","Exclusivamente la demograf\xEDa","La geolog\xEDa aplicada"],correcta:1,explicacion:"La geograf\xEDa humana analiza la distribuci\xF3n, organizaci\xF3n y relaci\xF3n de las poblaciones humanas con su entorno."},{temaId:33,pregunta:"\xBFC\xF3mo se define la seguridad ciudadana en sentido amplio?",opciones:["Solo la ausencia de delitos","La situaci\xF3n de tranquilidad y orden que permite el ejercicio de derechos y libertades","Exclusivamente la seguridad vial","La seguridad militar del Estado"],correcta:1,explicacion:"La seguridad ciudadana se entiende como la garant\xEDa de que los ciudadanos puedan ejercer sus derechos y libertades en un marco de convivencia pac\xEDfica."},{temaId:34,pregunta:"\xBFQu\xE9 t\xE9rmino define la dependencia f\xEDsica y/o psicol\xF3gica hacia una sustancia?",opciones:["Tolerancia","Drogodependencia","Abstinencia","Intoxicaci\xF3n aguda"],correcta:1,explicacion:"La drogodependencia es el estado de dependencia f\xEDsica y/o ps\xEDquica respecto de una sustancia psicoactiva."},{temaId:35,pregunta:"\xBFEn qu\xE9 a\xF1o adopt\xF3 la ONU la Agenda 2030 con los Objetivos de Desarrollo Sostenible?",opciones:["2000","2010","2015","2020"],correcta:2,explicacion:"La Agenda 2030 y sus 17 Objetivos de Desarrollo Sostenible fueron adoptados por la ONU en septiembre de 2015."},{temaId:36,pregunta:"\xBFC\xF3mo se denomina la parte de la gram\xE1tica que estudia la estructura interna de las palabras?",opciones:["Sintaxis","Morfolog\xEDa","Fon\xE9tica","Sem\xE1ntica"],correcta:1,explicacion:"La morfolog\xEDa estudia la estructura y formaci\xF3n de las palabras; la sintaxis estudia su combinaci\xF3n en la oraci\xF3n."},{temaId:37,pregunta:"\xBFCu\xE1ndo se acent\xFAan ortogr\xE1ficamente las palabras agudas en espa\xF1ol?",opciones:["Cuando terminan en vocal, n o s","Nunca llevan tilde","Solo si tienen m\xE1s de tres s\xEDlabas","Cuando terminan en consonante distinta de n o s"],correcta:0,explicacion:"Las palabras agudas se acent\xFAan cuando terminan en vocal, 'n' o 's' (p. ej. 'cami\xF3n', 'comp\xE1s')."},{temaId:38,pregunta:"\xBFCu\xE1l de los siguientes es un sistema operativo de c\xF3digo abierto?",opciones:["Windows","macOS","Linux","iOS"],correcta:2,explicacion:"Linux es un sistema operativo de c\xF3digo abierto, a diferencia de Windows, macOS o iOS, que son propietarios."},{temaId:39,pregunta:"\xBFCu\xE1ntas capas tiene el modelo OSI de referencia para redes inform\xE1ticas?",opciones:["5","6","7","4"],correcta:2,explicacion:"El modelo OSI se compone de 7 capas: f\xEDsica, enlace, red, transporte, sesi\xF3n, presentaci\xF3n y aplicaci\xF3n."},{temaId:40,pregunta:"\xBFCu\xE1l es la primera fase del ciclo de inteligencia?",opciones:["Difusi\xF3n","Direcci\xF3n/planificaci\xF3n","Explotaci\xF3n","Obtenci\xF3n"],correcta:1,explicacion:"El ciclo de inteligencia comienza con la fase de direcci\xF3n o planificaci\xF3n, donde se determinan las necesidades de informaci\xF3n."},{temaId:41,pregunta:"\xBFC\xF3mo se denomina el env\xEDo masivo de correos fraudulentos para obtener datos confidenciales?",opciones:["Phishing","Pharming","Cryptojacking","Ransomware"],correcta:0,explicacion:"El phishing consiste en el env\xEDo de comunicaciones fraudulentas, normalmente por correo, para obtener informaci\xF3n sensible de la v\xEDctima."},{temaId:42,pregunta:"\xBFQu\xE9 elemento del cartucho contiene la carga propulsora que impulsa el proyectil?",opciones:["La vaina","El fulminante","La p\xF3lvora","El proyectil"],correcta:2,explicacion:"La p\xF3lvora es la carga propulsora que, al inflamarse, genera los gases que impulsan el proyectil."},{temaId:43,pregunta:"\xBFQu\xE9 requisito general deben cumplir los veh\xEDculos prioritarios para circular como tales?",opciones:["\xDAnicamente llevar rotulaci\xF3n","Hacer uso de la se\xF1alizaci\xF3n luminosa y, en su caso, ac\xFAstica reglamentaria","Superar siempre el l\xEDmite de velocidad","No est\xE1n sujetos a ninguna norma"],correcta:1,explicacion:"Los veh\xEDculos prioritarios deben hacer uso de la se\xF1alizaci\xF3n luminosa especial y, cuando proceda, ac\xFAstica, para poder acogerse a las excepciones que la norma les reconoce."},{temaId:44,pregunta:"\xBFQu\xE9 principio deben respetar siempre los conductores de veh\xEDculos prioritarios pese a sus facultades especiales?",opciones:["Ninguno, est\xE1n exentos de toda norma","El principio de seguridad, no poniendo en peligro injustificado a terceros","Solo deben respetar los sem\xE1foros","\xDAnicamente los l\xEDmites de velocidad urbanos"],correcta:1,explicacion:"Aun gozando de prioridad de paso, deben conducir con precauci\xF3n y no generar riesgos injustificados para el resto de usuarios de la v\xEDa."},{temaId:45,pregunta:"\xBFQu\xE9 factor de riesgo se asocia principalmente a la conducci\xF3n de veh\xEDculos policiales de emergencia?",opciones:["El estr\xE9s y la conducci\xF3n bajo presi\xF3n temporal","La ausencia total de riesgo","Solo el mal estado de la v\xEDa","Exclusivamente el clima"],correcta:0,explicacion:"La conducci\xF3n de emergencia implica factores de riesgo espec\xEDficos como la presi\xF3n temporal y el estr\xE9s, contemplados en la prevenci\xF3n de riesgos laborales en seguridad vial."}],nv=[{temaId:1,pregunta:"Seg\xFAn la clasificaci\xF3n aristot\xE9lica, \xBFqu\xE9 caracteriza al Derecho natural frente al positivo?",opciones:["Es cambiante y dictado por el Estado","Es inmutable y universal, fundado en la naturaleza humana","Solo rige en un territorio concreto","Se aplica exclusivamente a los funcionarios"],correcta:1,explicacion:"El Derecho natural se considera inmutable y universal por fundarse en la naturaleza humana, a diferencia del positivo, que puede cambiar seg\xFAn el momento hist\xF3rico."},{temaId:1,pregunta:"\xBFA qu\xE9 se refiere el Derecho subjetivo?",opciones:["Al conjunto de normas que rigen una sociedad","A la facultad del individuo para actuar en defensa de sus propios intereses","\xDAnicamente al Derecho Penal","A los reglamentos administrativos"],correcta:1,explicacion:"El Derecho subjetivo es la facultad o poder que tiene el individuo para hacer valer un inter\xE9s propio, como el derecho a la propiedad."},{temaId:1,pregunta:"Seg\xFAn el art\xEDculo 1 del C\xF3digo Civil, \xBFcu\xE1les son las fuentes del ordenamiento jur\xEDdico espa\xF1ol?",opciones:["La Constituci\xF3n, la Ley y los Tratados","La Ley, la costumbre y los principios generales del derecho","La jurisprudencia, la doctrina y la costumbre","Los reglamentos y las \xF3rdenes ministeriales"],correcta:1,explicacion:"El art\xEDculo 1 del C\xF3digo Civil establece como fuentes del ordenamiento jur\xEDdico espa\xF1ol la Ley, la costumbre y los principios generales del derecho."},{temaId:1,pregunta:"\xBFCu\xE1les son las dos partes en que se estructura una norma jur\xEDdica?",opciones:["Pre\xE1mbulo y articulado","Supuesto de hecho y consecuencia jur\xEDdica","Exposici\xF3n de motivos y disposici\xF3n final","Norma y jurisprudencia"],correcta:1,explicacion:"Toda norma jur\xEDdica se compone de un supuesto de hecho (la realidad que regula) y una consecuencia jur\xEDdica (la respuesta o sanci\xF3n ante su incumplimiento)."},{temaId:1,pregunta:"\xBFC\xF3mo se denomina la propiedad de las normas jur\xEDdicas por la que su cumplimiento puede exigirse mediante medios coactivos?",opciones:["Bilateralidad","Generalidad","Coercitividad","Legitimidad"],correcta:2,explicacion:"La coercitividad (o coactividad) es el car\xE1cter externo de la norma jur\xEDdica que permite imponer su observancia mediante medios coactivos."},{temaId:1,pregunta:"\xBFEn qu\xE9 art\xEDculo de la Constituci\xF3n Espa\xF1ola se reconoce el principio de jerarqu\xEDa normativa?",opciones:["Art\xEDculo 1.1","Art\xEDculo 9.3","Art\xEDculo 14","Art\xEDculo 66"],correcta:1,explicacion:"El art\xEDculo 9.3 de la Constituci\xF3n garantiza, entre otros, el principio de jerarqu\xEDa normativa del ordenamiento jur\xEDdico."},{temaId:1,pregunta:"\xBFQu\xE9 mayor\xEDa exige la Constituci\xF3n para la aprobaci\xF3n de una ley org\xE1nica?",opciones:["Mayor\xEDa simple del Congreso","Mayor\xEDa absoluta del Congreso en votaci\xF3n final sobre el conjunto del proyecto","Mayor\xEDa de dos tercios del Senado","Unanimidad de ambas c\xE1maras"],correcta:1,explicacion:"El art\xEDculo 81 CE exige mayor\xEDa absoluta del Congreso, en una votaci\xF3n final sobre el conjunto del proyecto, para aprobar, modificar o derogar una ley org\xE1nica."},{temaId:1,pregunta:"En caso de extraordinaria y urgente necesidad, \xBFqu\xE9 disposici\xF3n legislativa provisional puede dictar el Gobierno?",opciones:["Un Decreto Legislativo","Un Decreto-ley","Una Ley Org\xE1nica","Un Real Decreto reglamentario"],correcta:1,explicacion:"El art\xEDculo 86 CE permite al Gobierno dictar Decretos-leyes en caso de extraordinaria y urgente necesidad, con las limitaciones materiales que fija ese mismo art\xEDculo."},{temaId:1,pregunta:"\xBFEn qu\xE9 plazo debe el Congreso pronunciarse sobre la convalidaci\xF3n o derogaci\xF3n de un Decreto-ley?",opciones:["15 d\xEDas","20 d\xEDas","30 d\xEDas","60 d\xEDas"],correcta:2,explicacion:"El Decreto-ley debe someterse a debate y votaci\xF3n del Congreso en el plazo de los treinta d\xEDas siguientes a su promulgaci\xF3n."},{temaId:1,pregunta:"Seg\xFAn el C\xF3digo Civil, \xBFcu\xE1ndo entra en vigor una ley si no se dispone otra cosa en ella?",opciones:["El mismo d\xEDa de su publicaci\xF3n","A los 20 d\xEDas de su completa publicaci\xF3n en el BOE","A los 30 d\xEDas naturales","Un a\xF1o despu\xE9s de su aprobaci\xF3n"],correcta:1,explicacion:"El art\xEDculo 2.1 del C\xF3digo Civil fija en 20 d\xEDas el periodo de 'vacatio legis' tras la publicaci\xF3n en el BOE, salvo que la propia norma disponga otro plazo."},{temaId:1,pregunta:"\xBFQu\xE9 diferencia hay entre derogaci\xF3n expresa y t\xE1cita de una ley?",opciones:["No existe diferencia","La expresa se manifiesta expl\xEDcitamente por el legislador; la t\xE1cita se produce cuando la nueva ley contradice o sustituye a la anterior sin decirlo","La t\xE1cita solo aplica a reglamentos","La expresa solo la puede declarar el Tribunal Constitucional"],correcta:1,explicacion:"La derogaci\xF3n es expresa cuando el legislador lo manifiesta expl\xEDcitamente, y t\xE1cita cuando el contenido de la ley nueva es incompatible con el de la anterior sin decirlo abiertamente."},{temaId:1,pregunta:"\xBFQu\xE9 se entiende por mayor\xEDa absoluta en el contexto constitucional espa\xF1ol?",opciones:["M\xE1s votos a favor que en contra entre los presentes","El voto favorable de la mitad m\xE1s uno de la totalidad de los miembros del \xF3rgano, est\xE9n presentes o no","El voto de dos tercios de los presentes","El voto un\xE1nime de todos los miembros"],correcta:1,explicacion:"La mayor\xEDa absoluta exige el voto favorable de la mitad m\xE1s uno de la totalidad de los miembros legales del \xF3rgano, con independencia de si est\xE1n presentes en la sesi\xF3n."},{temaId:1,pregunta:"Seg\xFAn el art\xEDculo 30 del C\xF3digo Civil, \xBFen qu\xE9 momento se adquiere la personalidad jur\xEDdica?",opciones:["Desde la concepci\xF3n","En el momento del nacimiento con vida, tras el entero desprendimiento del seno materno","Al cumplir la mayor\xEDa de edad","Al inscribirse en el Registro Civil"],correcta:1,explicacion:"El art\xEDculo 30 CC establece que la personalidad se adquiere en el momento del nacimiento con vida, una vez producido el entero desprendimiento del seno materno."},{temaId:1,pregunta:"\xBFQu\xE9 diferencia existe entre capacidad jur\xEDdica y capacidad de obrar?",opciones:["Son sin\xF3nimos","La capacidad jur\xEDdica se tiene desde que se es persona; la capacidad de obrar es la posibilidad de ejercer por uno mismo los derechos, y se adquiere normalmente con la mayor\xEDa de edad","La capacidad de obrar es previa a la jur\xEDdica","Solo las personas jur\xEDdicas tienen capacidad de obrar"],correcta:1,explicacion:"La capacidad jur\xEDdica es inherente a toda persona desde que adquiere tal condici\xF3n; la capacidad de obrar exige, por regla general, alcanzar la mayor\xEDa de edad."},{temaId:1,pregunta:"\xBFA partir de qu\xE9 edad puede un menor emanciparse con el consentimiento de quienes ejercen la patria potestad?",opciones:["14 a\xF1os","16 a\xF1os","17 a\xF1os","18 a\xF1os"],correcta:1,explicacion:"El art\xEDculo 241 del C\xF3digo Civil exige que el menor tenga diecis\xE9is a\xF1os cumplidos y preste su consentimiento para la emancipaci\xF3n por concesi\xF3n de quienes ejercen la patria potestad."},{temaId:1,pregunta:"\xBFQu\xE9 criterio de adquisici\xF3n de la nacionalidad espa\xF1ola de origen se basa en la filiaci\xF3n (ser hijo de espa\xF1ol o espa\xF1ola)?",opciones:["Ius soli","Ius sanguinis","Ius connubii","Ius domicilii"],correcta:1,explicacion:"El criterio del 'ius sanguinis' atribuye la nacionalidad espa\xF1ola de origen por ser hijo de padre o madre espa\xF1ola, con independencia del lugar de nacimiento."},{temaId:1,pregunta:"Como norma general, \xBFcu\xE1ntos a\xF1os de residencia legal en Espa\xF1a se exigen para adquirir la nacionalidad espa\xF1ola por residencia?",opciones:["5 a\xF1os","10 a\xF1os","15 a\xF1os","2 a\xF1os"],correcta:1,explicacion:"La regla general exige diez a\xF1os de residencia, con plazos reducidos para determinados colectivos: cinco a\xF1os para refugiados, dos para iberoamericanos y otros pa\xEDses vinculados, y uno en supuestos especiales."},{temaId:1,pregunta:"\xBFC\xF3mo define el art\xEDculo 40 del C\xF3digo Civil el domicilio de las personas naturales?",opciones:["El lugar donde nacieron","El lugar de su residencia habitual y, en su caso, el que determine la Ley de Enjuiciamiento Civil","El lugar donde trabajan","El lugar donde est\xE1n empadronados sus padres"],correcta:1,explicacion:"El art\xEDculo 40 CC define el domicilio de las personas naturales como el lugar de su residencia habitual, remiti\xE9ndose en su caso a la Ley de Enjuiciamiento Civil."},{temaId:1,pregunta:"\xBFQu\xE9 determina la vecindad civil de una persona?",opciones:["Su nacionalidad","La legislaci\xF3n civil, com\xFAn o foral, que le resulta aplicable","El municipio donde est\xE1 empadronada","Su domicilio fiscal"],correcta:1,explicacion:"La vecindad civil determina qu\xE9 legislaci\xF3n civil (el Derecho com\xFAn o alguno de los Derechos forales) resulta aplicable a cada ciudadano espa\xF1ol."},{temaId:5,pregunta:"\xBFQu\xE9 ley regula con car\xE1cter general el r\xE9gimen jur\xEDdico del sector p\xFAblico en Espa\xF1a?",opciones:["Ley 39/2015","Ley 40/2015","Ley 50/1997","Ley 7/2007"],correcta:1,explicacion:"La Ley 40/2015, de R\xE9gimen Jur\xEDdico del Sector P\xFAblico, regula la organizaci\xF3n y funcionamiento de la Administraci\xF3n General del Estado y del resto del sector p\xFAblico."},{temaId:5,pregunta:"Seg\xFAn el art\xEDculo 103 de la Constituci\xF3n, \xBFcon qu\xE9 principios debe actuar la Administraci\xF3n P\xFAblica?",opciones:["Jerarqu\xEDa, eficacia, descentralizaci\xF3n, desconcentraci\xF3n y coordinaci\xF3n","Autonom\xEDa, rapidez y econom\xEDa","Publicidad, oralidad y contradicci\xF3n","Unidad de mando y disciplina"],correcta:0,explicacion:"El art\xEDculo 103 CE establece que la Administraci\xF3n P\xFAblica act\xFAa con sometimiento pleno a la ley y al Derecho, de acuerdo con los principios de eficacia, jerarqu\xEDa, descentralizaci\xF3n, desconcentraci\xF3n y coordinaci\xF3n."},{temaId:5,pregunta:"\xBFQu\xE9 integra el sector p\xFAblico institucional seg\xFAn la Ley 40/2015?",opciones:["Solo la AGE","Organismos y entidades de derecho p\xFAblico o privado vinculados a las Administraciones P\xFAblicas, incluidas las universidades p\xFAblicas","\xDAnicamente las Comunidades Aut\xF3nomas","Solo las entidades locales"],correcta:1,explicacion:"El sector p\xFAblico institucional incluye organismos p\xFAblicos, entidades de derecho privado vinculadas a las Administraciones P\xFAblicas y las universidades p\xFAblicas."},{temaId:5,pregunta:"\xBFCu\xE1les son los \xF3rganos superiores de la organizaci\xF3n central de la AGE?",opciones:["Los Directores Generales y Subdirectores Generales","Los Ministros y los Secretarios de Estado","Los Delegados y Subdelegados del Gobierno","Los Secretarios Generales T\xE9cnicos"],correcta:1,explicacion:"En la organizaci\xF3n central de la AGE son \xF3rganos superiores los Ministros y los Secretarios de Estado; los \xF3rganos directivos incluyen Subsecretarios, Secretarios Generales, Directores Generales y Subdirectores Generales."},{temaId:5,pregunta:"\xBFQu\xE9 rango tienen los Delegados del Gobierno en las Comunidades Aut\xF3nomas?",opciones:["Rango de Director General","Rango de Subsecretario","Rango de Ministro","Rango de Subdirector General"],correcta:1,explicacion:"Los Delegados del Gobierno en las Comunidades Aut\xF3nomas tienen rango de Subsecretario."},{temaId:5,pregunta:"\xBFQu\xE9 nivel tienen los Subdelegados del Gobierno en las provincias?",opciones:["Nivel de Director General","Nivel de Subdirector General","Nivel de Subsecretario","Nivel de Secretario de Estado"],correcta:1,explicacion:"Los Subdelegados del Gobierno en las provincias tienen nivel de Subdirector General y dependen del Delegado del Gobierno correspondiente."},{temaId:5,pregunta:"\xBFQui\xE9n dirige las Fuerzas y Cuerpos de Seguridad del Estado en una provincia, seg\xFAn la organizaci\xF3n territorial de la AGE?",opciones:["El Delegado del Gobierno directamente","El Subdelegado del Gobierno, salvo en Comunidades uniprovinciales donde asume el Delegado","El Presidente de la Comunidad Aut\xF3noma","El alcalde de la capital de provincia"],correcta:1,explicacion:"Los Subdelegados del Gobierno dirigen las Fuerzas y Cuerpos de Seguridad del Estado en la provincia; en las Comunidades uniprovinciales sin Subdelegado, esa competencia la asume el propio Delegado del Gobierno."},{temaId:5,pregunta:"\xBFC\xF3mo se llama el \xF3rgano colegiado que coordina la actuaci\xF3n de la Administraci\xF3n perif\xE9rica del Estado con los distintos ministerios?",opciones:["CICAPE","COREPER","CECIR","CORA"],correcta:0,explicacion:"La Comisi\xF3n Interministerial de Coordinaci\xF3n de la Administraci\xF3n Perif\xE9rica del Estado (CICAPE) se encarga de coordinar la actuaci\xF3n de la Administraci\xF3n perif\xE9rica con los distintos departamentos ministeriales."},{temaId:5,pregunta:"\xBFQu\xE9 ley desarrolla el r\xE9gimen jur\xEDdico del Gobierno previsto en la Constituci\xF3n?",opciones:["Ley 50/1997, del Gobierno","Ley 40/2015","Ley 6/1997","LO 2/1986"],correcta:0,explicacion:"La Ley 50/1997, de 27 de noviembre, del Gobierno, desarrolla los principios y criterios constitucionales relativos al \xF3rgano Gobierno."},{temaId:5,pregunta:"\xBFCu\xE1les son los tres principios que configuran el funcionamiento del Gobierno seg\xFAn la Ley 50/1997?",opciones:["Legalidad, jerarqu\xEDa y publicidad","Direcci\xF3n presidencial, colegialidad y departamental","Unidad, eficacia y transparencia","Autonom\xEDa, coordinaci\xF3n y subsidiariedad"],correcta:1,explicacion:"El funcionamiento del Gobierno se articula en torno al principio de direcci\xF3n presidencial, el de colegialidad (responsabilidad solidaria) y el departamental (autonom\xEDa de gesti\xF3n de cada Ministro)."},{temaId:5,pregunta:"\xBFDe qui\xE9nes se compone el Gobierno seg\xFAn el art\xEDculo 1 de la Ley 50/1997?",opciones:["Del Presidente, los Vicepresidentes en su caso, y los Ministros","\xDAnicamente del Presidente y los Ministros","Del Presidente, el Rey y los Secretarios de Estado","De los Ministros y los Secretarios de Estado"],correcta:0,explicacion:"El Gobierno se compone del Presidente, de los Vicepresidentes, en su caso, y de los Ministros."},{temaId:5,pregunta:"\xBFA qui\xE9n corresponde interponer el recurso de inconstitucionalidad en nombre del Gobierno?",opciones:["A cualquier Ministro","Al Presidente del Gobierno","Al Consejo de Estado","A los Secretarios de Estado"],correcta:1,explicacion:"Entre las funciones del Presidente del Gobierno recogidas en el art\xEDculo 2 de la Ley 50/1997 est\xE1 la de interponer el recurso de inconstitucionalidad."},{temaId:5,pregunta:"\xBFQu\xE9 caracter\xEDsticas tienen las deliberaciones del Consejo de Ministros?",opciones:["P\xFAblicas","Secretas","Reservadas pero accesibles bajo petici\xF3n","Se publican en el BOE"],correcta:1,explicacion:"El art\xEDculo 5 de la Ley 50/1997 establece que las deliberaciones del Consejo de Ministros ser\xE1n secretas."},{temaId:5,pregunta:"\xBFY las deliberaciones de la Comisi\xF3n General de Secretarios de Estado y Subsecretarios?",opciones:["Secretas","Reservadas","P\xFAblicas","Semip\xFAblicas"],correcta:1,explicacion:"A diferencia del Consejo de Ministros (deliberaciones secretas), las de la Comisi\xF3n General de Secretarios de Estado y Subsecretarios son reservadas."},{temaId:5,pregunta:"\xBFQu\xE9 \xF3rgano vela por la correcta y fiel publicaci\xF3n de las disposiciones del Gobierno en el BOE?",opciones:["El Secretariado del Gobierno","El Consejo de Estado","Los Gabinetes","La Comisi\xF3n General de Secretarios de Estado"],correcta:0,explicacion:"El Secretariado del Gobierno, integrado en el Ministerio de la Presidencia, tiene entre sus funciones velar por la correcta y fiel publicaci\xF3n de las normas del Gobierno en el BOE."},{temaId:5,pregunta:"\xBFQu\xE9 son los Gabinetes seg\xFAn la Ley 50/1997?",opciones:["\xD3rganos con potestad reglamentaria propia","\xD3rganos de apoyo pol\xEDtico y t\xE9cnico del Presidente, Vicepresidentes, Ministros y Secretarios de Estado","\xD3rganos jurisdiccionales","Comisiones parlamentarias"],correcta:1,explicacion:"Los Gabinetes son \xF3rganos de apoyo pol\xEDtico y t\xE9cnico de los altos cargos del Gobierno, realizando tareas de confianza y asesoramiento especial."},{temaId:5,pregunta:"Seg\xFAn el art\xEDculo 21 de la Ley 50/1997, \xBFqu\xE9 facultad NO puede ejercer el Presidente del Gobierno en funciones?",opciones:["El despacho ordinario de los asuntos p\xFAblicos","Proponer al Rey la disoluci\xF3n de alguna de las C\xE1maras o de las Cortes Generales","Firmar el Bolet\xEDn Oficial del Estado","Convocar al Consejo de Ministros"],correcta:1,explicacion:"El Gobierno en funciones limita su gesti\xF3n al despacho ordinario de los asuntos p\xFAblicos; el Presidente en funciones no puede proponer al Rey la disoluci\xF3n de las C\xE1maras."},{temaId:5,pregunta:"\xBFQu\xE9 ocurre con las delegaciones legislativas otorgadas por las Cortes al Gobierno mientras este est\xE1 en funciones tras unas elecciones?",opciones:["Se extinguen definitivamente","Quedan en suspenso durante todo el tiempo que el Gobierno est\xE9 en funciones","Se ampl\xEDan autom\xE1ticamente","No se ven afectadas"],correcta:1,explicacion:"Las delegaciones legislativas quedan en suspenso durante el periodo en que el Gobierno permanece en funciones tras la celebraci\xF3n de elecciones."},{temaId:6,pregunta:"\xBFQu\xE9 norma constituye el Estatuto B\xE1sico del Empleado P\xFAblico (TREBEP) actualmente en vigor?",opciones:["Ley 7/2007","Real Decreto Legislativo 5/2015","Ley 30/1984","Ley 40/2015"],correcta:1,explicacion:"El Real Decreto Legislativo 5/2015 aprueba el texto refundido de la Ley del Estatuto B\xE1sico del Empleado P\xFAblico (TREBEP), que sustituy\xF3 a la Ley 7/2007."},{temaId:6,pregunta:"Seg\xFAn el art\xEDculo 8 del TREBEP, \xBFcu\xE1les son las cuatro clases de empleados p\xFAblicos?",opciones:["Funcionarios de carrera, funcionarios interinos, personal laboral y personal eventual","Funcionarios de carrera, altos cargos, personal directivo y personal laboral","Funcionarios civiles, militares, judiciales y policiales","Personal fijo, temporal, eventual y de confianza"],correcta:0,explicacion:"El TREBEP distingue cuatro clases de empleados p\xFAblicos: funcionarios de carrera, funcionarios interinos, personal laboral (fijo, indefinido o temporal) y personal eventual."},{temaId:6,pregunta:"\xBFQu\xE9 titulaci\xF3n se exige para acceder a un cuerpo o escala del Subgrupo A1?",opciones:["T\xEDtulo de T\xE9cnico Superior","T\xEDtulo de Graduado en Educaci\xF3n Secundaria","T\xEDtulo universitario de Grado (o equivalente)","T\xEDtulo de Bachillerato"],correcta:2,explicacion:"El Grupo A (subgrupos A1 y A2) exige estar en posesi\xF3n de un t\xEDtulo universitario de Grado; la diferencia entre A1 y A2 depende del nivel de responsabilidad de las funciones."},{temaId:6,pregunta:"\xBFQu\xE9 modalidad de carrera profesional consiste en el ascenso en la estructura de puestos de trabajo mediante los procedimientos de provisi\xF3n establecidos?",opciones:["Carrera horizontal","Carrera vertical","Promoci\xF3n interna horizontal","Evaluaci\xF3n del desempe\xF1o"],correcta:1,explicacion:"La carrera vertical consiste en el ascenso en la estructura de puestos de trabajo por los procedimientos de provisi\xF3n (concurso o libre designaci\xF3n)."},{temaId:6,pregunta:"\xBFCu\xE1l es la edad m\xEDnima general exigida para participar en un proceso selectivo de acceso al empleo p\xFAblico?",opciones:["16 a\xF1os","18 a\xF1os","21 a\xF1os","14 a\xF1os"],correcta:0,explicacion:"El TREBEP exige, con car\xE1cter general, tener cumplidos diecis\xE9is a\xF1os de edad para poder participar en los procesos selectivos."},{temaId:6,pregunta:"\xBFQu\xE9 porcentaje m\xEDnimo de las vacantes de las ofertas de empleo p\xFAblico debe reservarse para personas con discapacidad?",opciones:["El 2%","El 5%","El 7%","El 10%"],correcta:2,explicacion:"El TREBEP reserva un cupo no inferior al 7% de las vacantes para personas con discapacidad, de las cuales al menos el 2% debe destinarse a discapacidad intelectual."},{temaId:6,pregunta:"\xBFCu\xE1l es el sistema selectivo excepcional que consiste \xFAnicamente en la valoraci\xF3n de m\xE9ritos?",opciones:["Oposici\xF3n","Concurso-oposici\xF3n","Concurso","Libre designaci\xF3n"],correcta:2,explicacion:"El sistema de concurso, que consiste \xFAnicamente en la valoraci\xF3n de m\xE9ritos, solo puede aplicarse con car\xE1cter excepcional y en virtud de una Ley."},{temaId:6,pregunta:"\xBFCu\xE1les son los requisitos sucesivos para adquirir la condici\xF3n de funcionario de carrera?",opciones:["Superaci\xF3n del proceso selectivo, nombramiento, acatamiento de la Constituci\xF3n y toma de posesi\xF3n","Solo superar el proceso selectivo","Nombramiento y antig\xFCedad de dos a\xF1os","Superar el proceso selectivo y jurar el cargo ante notario"],correcta:0,explicacion:"La condici\xF3n de funcionario de carrera se adquiere por el cumplimiento sucesivo de: superaci\xF3n del proceso selectivo, nombramiento por el \xF3rgano competente, acto de acatamiento de la Constituci\xF3n y toma de posesi\xF3n en plazo."},{temaId:6,pregunta:"\xBFCu\xE1l de las siguientes NO es causa de p\xE9rdida de la condici\xF3n de funcionario de carrera seg\xFAn el TREBEP?",opciones:["La renuncia","La p\xE9rdida de la nacionalidad","El disfrute de una excedencia voluntaria","La sanci\xF3n disciplinaria firme de separaci\xF3n del servicio"],correcta:2,explicacion:"La excedencia voluntaria es una situaci\xF3n administrativa, no una causa de p\xE9rdida de la condici\xF3n de funcionario; s\xED lo son la renuncia, la p\xE9rdida de la nacionalidad, la jubilaci\xF3n total, la separaci\xF3n del servicio y la inhabilitaci\xF3n firme."},{temaId:6,pregunta:"\xBFA qu\xE9 edad se declara de oficio la jubilaci\xF3n forzosa de un funcionario de carrera, salvo normativa espec\xEDfica?",opciones:["65 a\xF1os, prorrogable hasta los 70","60 a\xF1os, sin pr\xF3rroga posible","67 a\xF1os, sin excepciones","70 a\xF1os, sin posibilidad de pr\xF3rroga"],correcta:0,explicacion:"La jubilaci\xF3n forzosa se declara de oficio al cumplir el funcionario 65 a\xF1os, si bien puede solicitarse la prolongaci\xF3n en el servicio activo como m\xE1ximo hasta los 70 a\xF1os."},{temaId:6,pregunta:"\xBFQu\xE9 diferencia hay entre la inhabilitaci\xF3n absoluta y la especial como causa de p\xE9rdida de la condici\xF3n de funcionario?",opciones:["No hay diferencia","La absoluta afecta a todos los empleos y cargos; la especial solo a los especificados en la sentencia","La especial es siempre m\xE1s grave que la absoluta","Solo la absoluta permite rehabilitaci\xF3n posterior"],correcta:1,explicacion:"La inhabilitaci\xF3n absoluta firme produce la p\xE9rdida de la condici\xF3n de funcionario respecto de todos los empleos o cargos; la especial, solo respecto de aquellos especificados en la sentencia."},{temaId:6,pregunta:"Si un funcionario pierde su condici\xF3n por p\xE9rdida de la nacionalidad y posteriormente la recupera, \xBFqu\xE9 puede solicitar?",opciones:["Nada, debe opositar de nuevo obligatoriamente","La rehabilitaci\xF3n de su condici\xF3n de funcionario","Una indemnizaci\xF3n econ\xF3mica","El ascenso autom\xE1tico a su antiguo puesto"],correcta:1,explicacion:"Desaparecida la causa objetiva que motiv\xF3 la extinci\xF3n de la relaci\xF3n de servicio (p\xE9rdida de nacionalidad o incapacidad permanente), el interesado puede solicitar la rehabilitaci\xF3n de su condici\xF3n de funcionario."},{temaId:6,pregunta:"\xBFQu\xE9 instrumento t\xE9cnico de planificaci\xF3n organiza y ordena los puestos de trabajo de una Administraci\xF3n, incluyendo los de naturaleza funcionarial, laboral y eventual?",opciones:["La Oferta de Empleo P\xFAblico","Las Relaciones de Puestos de Trabajo (RPT)","El Plan Estrat\xE9gico de Recursos Humanos","El Estatuto B\xE1sico del Empleado P\xFAblico"],correcta:1,explicacion:"Las Relaciones de Puestos de Trabajo son instrumentos t\xE9cnicos y p\xFAblicos que organizan, racionalizan y ordenan el personal de una Administraci\xF3n."},{temaId:6,pregunta:"Seg\xFAn el Real Decreto-ley 6/2023, \xBFen qu\xE9 plazo debe efectuarse la toma de posesi\xF3n de un funcionario de carrera tras la publicaci\xF3n de su nombramiento, con car\xE1cter general?",opciones:["15 d\xEDas naturales (1 mes si supone cambio de residencia)","3 d\xEDas h\xE1biles","1 mes en todo caso","Al d\xEDa siguiente del nombramiento"],correcta:0,explicacion:"La toma de posesi\xF3n del personal funcionario de carrera debe efectuarse en 15 d\xEDas naturales desde la publicaci\xF3n del nombramiento, ampliable a un mes si implica cambio de localidad de residencia."},{temaId:6,pregunta:"\xBFCu\xE1l es la duraci\xF3n m\xE1xima del nombramiento del personal directivo p\xFAblico profesional seg\xFAn el RD-ley 6/2023?",opciones:["2 a\xF1os, no renovable","5 a\xF1os, renovable por periodos id\xE9nticos","10 a\xF1os improrrogables","Indefinida, mientras no haya causa de cese"],correcta:1,explicacion:"El nombramiento del personal directivo p\xFAblico profesional tiene una duraci\xF3n m\xE1xima de cinco a\xF1os, renovable por periodos id\xE9nticos si se mantienen los requisitos."},{temaId:6,pregunta:"\xBFPor qu\xE9 procedimiento se realiza el nombramiento y cese del personal directivo p\xFAblico profesional en la Administraci\xF3n del Estado?",opciones:["Concurso de m\xE9ritos","Libre designaci\xF3n","Oposici\xF3n libre","Sorteo entre funcionarios de carrera"],correcta:1,explicacion:"El nombramiento y cese del personal directivo p\xFAblico profesional se realiza, en todo caso, por el procedimiento de libre designaci\xF3n."},{temaId:6,pregunta:"\xBFPuede el personal eventual computar su condici\xF3n como m\xE9rito para el acceso a la Funci\xF3n P\xFAblica o la promoci\xF3n interna?",opciones:["S\xED, siempre","No, en ning\xFAn caso","Solo si lleva m\xE1s de 5 a\xF1os","Solo en la Administraci\xF3n Local"],correcta:1,explicacion:"El TREBEP establece expresamente que la condici\xF3n de personal eventual no puede constituir m\xE9rito para el acceso a la Funci\xF3n P\xFAblica ni para la promoci\xF3n interna."},{temaId:6,pregunta:"\xBFCu\xE1l es, con car\xE1cter general, el ingreso m\xE1ximo en las Fuerzas y Cuerpos de Seguridad del Estado en cuanto a nacionalidad exigida?",opciones:["Solo se exige nacionalidad espa\xF1ola (RD 543/2001)","Se admite cualquier nacionalidad de la UE","Se admite cualquier nacionalidad con residencia legal","No hay ning\xFAn requisito de nacionalidad"],correcta:0,explicacion:"A diferencia del acceso general al empleo p\xFAblico, el ingreso en las Fuerzas y Cuerpos de Seguridad del Estado solo es posible, en la actualidad, para quienes tengan la nacionalidad espa\xF1ola (RD 543/2001)."},{temaId:8,pregunta:"\xBFC\xF3mo se nombra al titular de la Direcci\xF3n General de la Polic\xEDa?",opciones:["Por oposici\xF3n libre","Por Real Decreto del Consejo de Ministros, a propuesta del Ministro del Interior","Por elecci\xF3n entre los Comisarios Principales","Por designaci\xF3n del Rey"],correcta:1,explicacion:"El titular de la Direcci\xF3n General de la Polic\xEDa es nombrado por Real Decreto del Consejo de Ministros, a propuesta del Ministro del Interior."},{temaId:8,pregunta:"En caso de vacante, ausencia o enfermedad del titular de la Direcci\xF3n General de la Polic\xEDa, \xBFqui\xE9n le suple?",opciones:["El Secretario de Estado de Seguridad","El titular de la Direcci\xF3n Adjunta Operativa","El Comisario General de Seguridad Ciudadana","El Ministro del Interior directamente"],correcta:1,explicacion:"La suplencia del titular de la Direcci\xF3n General de la Polic\xEDa corresponde a la persona titular de la Direcci\xF3n Adjunta Operativa."},{temaId:8,pregunta:"\xBFQu\xE9 \xF3rganos, con nivel org\xE1nico de subdirecci\xF3n general, integran la organizaci\xF3n central de la DGP?",opciones:["Solo las Comisar\xEDas Generales","Direcci\xF3n Adjunta Operativa, Subdirecci\xF3n General de Recursos Humanos y Formaci\xF3n, Subdirecci\xF3n General de Log\xEDstica e Innovaci\xF3n, y el Gabinete T\xE9cnico","\xDAnicamente la Secretar\xEDa de Estado de Seguridad","Los Delegados del Gobierno"],correcta:1,explicacion:"La organizaci\xF3n central de la DGP se integra por la Direcci\xF3n Adjunta Operativa, la Subdirecci\xF3n General de Recursos Humanos y Formaci\xF3n, la Subdirecci\xF3n General de Log\xEDstica e Innovaci\xF3n y el Gabinete T\xE9cnico, todos con nivel de subdirecci\xF3n general."},{temaId:8,pregunta:"\xBFCu\xE1les son los dos \xF3rganos colegiados existentes a nivel central de la DGP?",opciones:["La Junta de Gobierno y el Consejo Asesor","El Consejo de Ministros y la Comisi\xF3n Permanente","El Comit\xE9 de Seguridad y la Junta de Personal","La Junta de Escalas y el Comit\xE9 de \xC9tica"],correcta:0,explicacion:"A nivel central de la Direcci\xF3n General de la Polic\xEDa existen dos \xF3rganos colegiados: la Junta de Gobierno y el Consejo Asesor."},{temaId:8,pregunta:"\xBFD\xF3nde radica la sede del Grupo Especial de Operaciones (GEO)?",opciones:["Madrid","\xC1vila","Guadalajara","Toledo"],correcta:2,explicacion:"La sede del Grupo Especial de Operaciones (GEO), unidad especializada en intervenciones de alto riesgo y car\xE1cter antiterrorista, radica en la ciudad de Guadalajara."},{temaId:8,pregunta:"\xBFD\xF3nde se ubica la Escuela Nacional de Polic\xEDa?",opciones:["Madrid","\xC1vila","Guadalajara","Linares (Ja\xE9n)"],correcta:1,explicacion:"La Escuela Nacional de Polic\xEDa tiene su sede en \xC1vila, y en ella se ubica tambi\xE9n la Secretar\xEDa Permanente de IBERPOL."},{temaId:8,pregunta:"\xBFQu\xE9 norma regula el r\xE9gimen estatutario de la Polic\xEDa Nacional?",opciones:["Ley 50/1997","LO 9/2015, de R\xE9gimen de Personal de la Polic\xEDa Nacional","TREBEP (RDL 5/2015)","LO 2/1986"],correcta:1,explicacion:"La LO 9/2015, de 28 de julio, de R\xE9gimen de Personal de la Polic\xEDa Nacional, regula el r\xE9gimen estatutario espec\xEDfico de los Polic\xEDas Nacionales, con car\xE1cter supletorio la legislaci\xF3n de funcionarios civiles de la AGE."},{temaId:8,pregunta:"\xBFEn cu\xE1ntas Escalas se estructura la Polic\xEDa Nacional?",opciones:["Dos: Superior y B\xE1sica","Tres: Superior, Ejecutiva y B\xE1sica","Cuatro: Superior, Ejecutiva, Subinspecci\xF3n y B\xE1sica","Cinco escalas"],correcta:2,explicacion:"La Polic\xEDa Nacional se estructura en cuatro Escalas: Superior, Ejecutiva, Subinspecci\xF3n y B\xE1sica, cada una con sus categor\xEDas correspondientes."},{temaId:8,pregunta:"\xBFQu\xE9 categor\xEDa corresponde a la primera categor\xEDa de la Escala Superior de la Polic\xEDa Nacional?",opciones:["Comisario Principal","Inspector Jefe","Comisario","Subinspector"],correcta:0,explicacion:"La Escala Superior tiene dos categor\xEDas: Comisario Principal (primera) y Comisario (segunda), ambas de promoci\xF3n interna."},{temaId:8,pregunta:"\xBFA qu\xE9 categor\xEDa se accede mediante oposici\xF3n libre en la Polic\xEDa Nacional?",opciones:["Comisario Principal y Comisario","Inspector Jefe \xFAnicamente","Polic\xEDa (Escala B\xE1sica) e Inspector (Escala Ejecutiva)","Subinspector exclusivamente"],correcta:2,explicacion:"El ingreso en la Polic\xEDa Nacional por oposici\xF3n libre se produce en las categor\xEDas de Polic\xEDa (Escala B\xE1sica) e Inspector (Escala Ejecutiva); el resto de categor\xEDas son de promoci\xF3n interna."},{temaId:8,pregunta:"\xBFA qu\xE9 grupo y subgrupo de clasificaci\xF3n profesional pertenece la Escala B\xE1sica de la Polic\xEDa Nacional?",opciones:["Grupo A, subgrupo A1","Grupo A, subgrupo A2","Grupo C, subgrupo C1","Grupo B"],correcta:2,explicacion:"La Escala B\xE1sica se clasifica en el Grupo C, subgrupo C1, mientras que la Escala Superior y Ejecutiva se integran en el Grupo A, subgrupo A1."},{temaId:8,pregunta:"\xBFQu\xE9 edad m\xEDnima se exige, con car\xE1cter general, para el acceso a la categor\xEDa de Polic\xEDa (Escala B\xE1sica)?",opciones:["16 a\xF1os","18 a\xF1os","21 a\xF1os","23 a\xF1os"],correcta:1,explicacion:"Entre los requisitos para el acceso a la categor\xEDa de Polic\xEDa se exige tener cumplidos 18 a\xF1os de edad y no exceder de la edad m\xE1xima de jubilaci\xF3n."},{temaId:8,pregunta:"Seg\xFAn la LO 4/2010, de r\xE9gimen disciplinario de la Polic\xEDa Nacional, \xBFen qu\xE9 plazo prescriben las faltas muy graves?",opciones:["Al mes","A los dos a\xF1os","A los seis a\xF1os","A los diez a\xF1os"],correcta:2,explicacion:"Las faltas leves prescriben al mes, las graves a los dos a\xF1os y las muy graves a los seis a\xF1os, seg\xFAn la LO 4/2010."},{temaId:8,pregunta:"\xBFCu\xE1l de las siguientes conductas se califica como falta MUY GRAVE en el r\xE9gimen disciplinario de la Polic\xEDa Nacional?",opciones:["Un simple retraso injustificado en el servicio","El incumplimiento del deber de fidelidad a la Constituci\xF3n en el ejercicio de las funciones","Una discusi\xF3n leve entre compa\xF1eros","Un error administrativo sin perjuicio a terceros"],correcta:1,explicacion:"El incumplimiento del deber de fidelidad a la Constituci\xF3n en el ejercicio de las funciones est\xE1 tipificado como falta muy grave en la LO 4/2010."},{temaId:8,pregunta:"\xBFCu\xE1les son las situaciones administrativas en las que puede hallarse un Polic\xEDa Nacional?",opciones:["Solo servicio activo o excedencia","Servicio activo, servicios especiales, servicio en otras Administraciones P\xFAblicas, excedencia, suspensi\xF3n de funciones y segunda actividad","\xDAnicamente activo, jubilado o cesado","Servicio activo y servicio pasivo"],correcta:1,explicacion:"La normativa vigente contempla seis situaciones administrativas: servicio activo, servicios especiales, servicio en otras Administraciones P\xFAblicas, excedencia, suspensi\xF3n de funciones y segunda actividad."},{temaId:8,pregunta:"\xBFQu\xE9 situaci\xF3n administrativa corresponde a un Polic\xEDa Nacional que resulta elegido Diputado de las Cortes Generales?",opciones:["Servicio activo","Excedencia voluntaria","Servicios especiales","Segunda actividad"],correcta:2,explicacion:"El acceso a la condici\xF3n de Diputado o Senador de las Cortes Generales, o miembro de una Asamblea Legislativa auton\xF3mica, determina el pase a la situaci\xF3n de servicios especiales."},{temaId:8,pregunta:"En la situaci\xF3n de servicios especiales, \xBFqu\xE9 retribuciones percibe el funcionario?",opciones:["Ninguna retribuci\xF3n","Las del puesto o cargo que desempe\xF1e, sin perjuicio de los trienios reconocidos","Las de su categor\xEDa en la Polic\xEDa Nacional, congeladas","Un complemento especial fijo"],correcta:1,explicacion:"Quienes se encuentren en servicios especiales perciben las retribuciones del puesto o cargo que desempe\xF1en, conservando el derecho a percibir los trienios reconocidos como Polic\xEDa Nacional."},{temaId:8,pregunta:"\xBFQu\xE9 es la 'relaci\xF3n org\xE1nica' de un funcionario, a efectos de las situaciones administrativas?",opciones:["El v\xEDnculo entre el funcionario y la Administraci\xF3n desde su ingreso hasta la extinci\xF3n","El v\xEDnculo entre el funcionario y el puesto de trabajo concreto que ocupa","Su afiliaci\xF3n sindical","Su expediente disciplinario"],correcta:1,explicacion:"La relaci\xF3n org\xE1nica es la que une al funcionario con el puesto de trabajo que ocupa; para que exista debe haber previamente relaci\xF3n de servicio con la Administraci\xF3n."},{temaId:2,pregunta:"Seg\xFAn el art\xEDculo 1.3 de la Constituci\xF3n, \xBFcu\xE1l es la forma pol\xEDtica del Estado espa\xF1ol?",opciones:["Rep\xFAblica parlamentaria","Monarqu\xEDa parlamentaria","Monarqu\xEDa absoluta","Confederaci\xF3n de reinos"],correcta:1,explicacion:"El art\xEDculo 1.3 CE establece que la forma pol\xEDtica del Estado espa\xF1ol es la Monarqu\xEDa parlamentaria."},{temaId:2,pregunta:"\xBFCu\xE1les son los valores superiores del ordenamiento jur\xEDdico seg\xFAn el art\xEDculo 1.1 CE?",opciones:["Orden, autoridad, disciplina y jerarqu\xEDa","Libertad, justicia, igualdad y pluralismo pol\xEDtico","Unidad, solidaridad, cooperaci\xF3n y lealtad","Seguridad, eficacia, m\xE9rito y capacidad"],correcta:1,explicacion:"El art\xEDculo 1.1 CE propugna como valores superiores del ordenamiento jur\xEDdico la libertad, la justicia, la igualdad y el pluralismo pol\xEDtico."},{temaId:2,pregunta:"\xBFD\xF3nde reside la soberan\xEDa nacional seg\xFAn la Constituci\xF3n?",opciones:["En el Rey","En las Cortes Generales","En el pueblo espa\xF1ol, del que emanan los poderes del Estado","En el Tribunal Constitucional"],correcta:2,explicacion:"El art\xEDculo 1.2 CE establece que la soberan\xEDa nacional reside en el pueblo espa\xF1ol, del que emanan los poderes del Estado."},{temaId:2,pregunta:"\xBFCu\xE1l es la capital del Estado seg\xFAn el art\xEDculo 5 de la Constituci\xF3n?",opciones:["Toledo","Madrid","Barcelona","No se especifica en la Constituci\xF3n"],correcta:1,explicacion:"El art\xEDculo 5 CE dispone expresamente que la capital del Estado es la villa de Madrid."},{temaId:2,pregunta:"\xBFQu\xE9 lengua es, seg\xFAn el art\xEDculo 3.1 CE, la lengua espa\xF1ola oficial del Estado, con deber de conocerla y derecho a usarla por todos los espa\xF1oles?",opciones:["El castellano","El espa\xF1ol y el catal\xE1n conjuntamente","La que determine cada Comunidad Aut\xF3noma","No hay lengua oficial \xFAnica"],correcta:0,explicacion:"El art\xEDculo 3.1 CE establece que el castellano es la lengua espa\xF1ola oficial del Estado, que todos los espa\xF1oles tienen el deber de conocer y el derecho a usar."},{temaId:2,pregunta:"\xBFQu\xE9 tres ej\xE9rcitos constituyen las Fuerzas Armadas seg\xFAn el art\xEDculo 8 CE?",opciones:["Ej\xE9rcito de Tierra, Armada y Ej\xE9rcito del Aire","Ej\xE9rcito de Tierra, Guardia Civil y Polic\xEDa Nacional","Armada, Aviaci\xF3n y Cuerpos de Seguridad","Ej\xE9rcito Nacional y Ej\xE9rcito Territorial"],correcta:0,explicacion:"El art\xEDculo 8 CE se\xF1ala que las Fuerzas Armadas est\xE1n constituidas por el Ej\xE9rcito de Tierra, la Armada y el Ej\xE9rcito del Aire, con la misi\xF3n de garantizar la soberan\xEDa e independencia de Espa\xF1a."},{temaId:2,pregunta:"\xBFCu\xE1l de los siguientes NO es uno de los principios que garantiza el art\xEDculo 9.3 de la Constituci\xF3n?",opciones:["El principio de legalidad","La jerarqu\xEDa normativa","La retroactividad de las disposiciones sancionadoras no favorables","La seguridad jur\xEDdica"],correcta:2,explicacion:"El art\xEDculo 9.3 CE garantiza la irretroactividad (no la retroactividad) de las disposiciones sancionadoras no favorables o restrictivas de derechos individuales, adem\xE1s de la legalidad, jerarqu\xEDa normativa, publicidad, seguridad jur\xEDdica, responsabilidad e interdicci\xF3n de la arbitrariedad."},{temaId:2,pregunta:"Seg\xFAn el art\xEDculo 10.2 CE, \xBFcon arreglo a qu\xE9 se interpretan las normas relativas a los derechos fundamentales?",opciones:["Exclusivamente con arreglo al C\xF3digo Civil","De conformidad con la Declaraci\xF3n Universal de Derechos Humanos y los tratados internacionales ratificados por Espa\xF1a","Seg\xFAn el criterio del Gobierno de turno","No existe criterio de interpretaci\xF3n"],correcta:1,explicacion:"El art\xEDculo 10.2 CE obliga a interpretar los derechos fundamentales de conformidad con la Declaraci\xF3n Universal de Derechos Humanos y los tratados y acuerdos internacionales ratificados por Espa\xF1a."},{temaId:2,pregunta:"\xBFA qu\xE9 edad se alcanza la mayor\xEDa de edad en Espa\xF1a seg\xFAn el art\xEDculo 12 CE?",opciones:["16 a\xF1os","18 a\xF1os","21 a\xF1os","17 a\xF1os"],correcta:1,explicacion:"El art\xEDculo 12 CE establece que los espa\xF1oles son mayores de edad a los dieciocho a\xF1os."},{temaId:2,pregunta:"\xBFA qui\xE9nes reserva el art\xEDculo 13.2 CE, con car\xE1cter general, la titularidad de los derechos del art\xEDculo 23 (participaci\xF3n pol\xEDtica y acceso a cargos p\xFAblicos)?",opciones:["A cualquier residente legal","Solo a los espa\xF1oles, salvo lo que pueda establecerse por tratado o ley para el sufragio municipal por reciprocidad","A los ciudadanos de la UE \xFAnicamente","A todos los extranjeros sin excepci\xF3n"],correcta:1,explicacion:"El art\xEDculo 13.2 CE reserva a los espa\xF1oles la titularidad de los derechos del art\xEDculo 23, salvo la excepci\xF3n prevista para el sufragio activo y pasivo en elecciones municipales, atendiendo a criterios de reciprocidad."},{temaId:2,pregunta:"\xBFCu\xE1l es el plazo m\xE1ximo de la detenci\xF3n preventiva seg\xFAn el art\xEDculo 17.2 CE?",opciones:["24 horas","48 horas","72 horas","5 d\xEDas"],correcta:2,explicacion:"El art\xEDculo 17.2 CE fija en 72 horas el plazo m\xE1ximo en que el detenido debe ser puesto en libertad o a disposici\xF3n de la autoridad judicial."},{temaId:2,pregunta:"\xBFQu\xE9 procedimiento regula el art\xEDculo 17.4 CE para lograr la inmediata puesta a disposici\xF3n judicial de una persona detenida ilegalmente?",opciones:["El recurso de amparo","El habeas corpus","El recurso de inconstitucionalidad","La cuesti\xF3n de confianza"],correcta:1,explicacion:"El art\xEDculo 17.4 CE remite a la ley la regulaci\xF3n de un procedimiento de habeas corpus para la inmediata puesta a disposici\xF3n judicial de toda persona detenida ilegalmente."},{temaId:2,pregunta:"Seg\xFAn el art\xEDculo 21 CE, \xBFnecesita autorizaci\xF3n previa el derecho de reuni\xF3n pac\xEDfica y sin armas?",opciones:["S\xED, siempre","No; solo se exige comunicaci\xF3n previa a la autoridad en reuniones en lugares de tr\xE1nsito p\xFAblico y manifestaciones","Solo si hay m\xE1s de 50 personas","S\xED, salvo en domicilios particulares"],correcta:1,explicacion:"El derecho de reuni\xF3n pac\xEDfica y sin armas no necesita autorizaci\xF3n previa; solo se exige comunicaci\xF3n previa a la autoridad cuando se trate de reuniones en lugares de tr\xE1nsito p\xFAblico o manifestaciones."},{temaId:2,pregunta:"\xBFQu\xE9 norma regula la instituci\xF3n del Defensor del Pueblo seg\xFAn el art\xEDculo 54 CE?",opciones:["Una ley ordinaria","Una ley org\xE1nica","Un Real Decreto","Directamente la propia Constituci\xF3n, sin desarrollo posterior"],correcta:1,explicacion:"El art\xEDculo 54 CE remite a una ley org\xE1nica la regulaci\xF3n del Defensor del Pueblo, alto comisionado de las Cortes Generales para la defensa de los derechos del T\xEDtulo I."},{temaId:2,pregunta:"\xBFEn qu\xE9 supuestos pueden suspenderse con car\xE1cter general los derechos reconocidos en los art\xEDculos 17, 18.2-3, 19, 20.1 a) y d), 21, 28.2 y 37.2 CE?",opciones:["Nunca pueden suspenderse","Cuando se declare el estado de excepci\xF3n o de sitio","Solo en tiempo de guerra declarada","Por simple decisi\xF3n del Ministro del Interior"],correcta:1,explicacion:"El art\xEDculo 55.1 CE permite la suspensi\xF3n de esos derechos cuando se declare el estado de excepci\xF3n o de sitio, en los t\xE9rminos previstos en la Constituci\xF3n."},{temaId:2,pregunta:"\xBFQu\xE9 permite el art\xEDculo 55.2 CE en relaci\xF3n con investigaciones sobre bandas armadas o terroristas?",opciones:["La suspensi\xF3n general de todos los derechos fundamentales","La suspensi\xF3n individual de los derechos de los art\xEDculos 17.2 y 18.2-3, con intervenci\xF3n judicial y control parlamentario","La suspensi\xF3n autom\xE1tica sin control judicial","Nada, ese supuesto no est\xE1 previsto"],correcta:1,explicacion:"El art\xEDculo 55.2 CE permite, mediante ley org\xE1nica, la suspensi\xF3n individual de los derechos de los art\xEDculos 17.2 y 18.2-3 para personas determinadas vinculadas a bandas armadas o terrorismo, con la necesaria intervenci\xF3n judicial y control parlamentario."},{temaId:2,pregunta:"\xBFCu\xE1l es, seg\xFAn el art\xEDculo 30.1 CE, un derecho y a la vez un deber de los espa\xF1oles?",opciones:["Votar en refer\xE9ndum","Defender a Espa\xF1a","Pagar impuestos","Trabajar en la funci\xF3n p\xFAblica"],correcta:1,explicacion:"El art\xEDculo 30.1 CE establece que los espa\xF1oles tienen el derecho y el deber de defender a Espa\xF1a."},{temaId:2,pregunta:"\xBFQu\xE9 garantiza el art\xEDculo 14 CE respecto a los espa\xF1oles?",opciones:["El derecho a la vivienda","La igualdad ante la ley, sin discriminaci\xF3n por nacimiento, raza, sexo, religi\xF3n u opini\xF3n","El derecho al trabajo","La libertad de empresa"],correcta:1,explicacion:"El art\xEDculo 14 CE proclama que los espa\xF1oles son iguales ante la ley, sin que pueda prevalecer discriminaci\xF3n por raz\xF3n de nacimiento, raza, sexo, religi\xF3n, opini\xF3n o cualquier otra condici\xF3n o circunstancia personal o social."},{temaId:3,pregunta:"\xBFDe cu\xE1ntos miembros se compone el Consejo General del Poder Judicial seg\xFAn el art\xEDculo 122.3 CE, y por cu\xE1nto tiempo?",opciones:["21 miembros (Presidente del TS + 20), por 5 a\xF1os","15 miembros, por 4 a\xF1os","27 miembros, por 6 a\xF1os","12 miembros, por 9 a\xF1os"],correcta:0,explicacion:"El CGPJ est\xE1 integrado por el Presidente del Tribunal Supremo, que lo preside, y 20 miembros nombrados por el Rey por un per\xEDodo de cinco a\xF1os (12 jueces/magistrados, 4 a propuesta del Congreso y 4 del Senado, estos \xFAltimos por mayor\xEDa de 3/5)."},{temaId:3,pregunta:"\xBFC\xF3mo se compone el Tribunal Constitucional seg\xFAn el art\xEDculo 159 CE?",opciones:["12 miembros: 4 a propuesta del Congreso, 4 del Senado, 2 del Gobierno y 2 del CGPJ","9 miembros elegidos \xEDntegramente por el Congreso","15 miembros nombrados directamente por el Rey","20 miembros, como el CGPJ"],correcta:0,explicacion:"El Tribunal Constitucional se compone de 12 miembros nombrados por el Rey: 4 a propuesta del Congreso (mayor\xEDa de 3/5), 4 del Senado (misma mayor\xEDa), 2 del Gobierno y 2 del Consejo General del Poder Judicial."},{temaId:3,pregunta:"\xBFPor cu\xE1nto tiempo son designados los miembros del Tribunal Constitucional y c\xF3mo se renuevan?",opciones:["6 a\xF1os, renovaci\xF3n total","9 a\xF1os, renov\xE1ndose por terceras partes cada 3 a\xF1os","5 a\xF1os, renovaci\xF3n por mitades cada 2 a\xF1os y medio","12 a\xF1os, sin renovaci\xF3n parcial"],correcta:1,explicacion:"El art\xEDculo 159.3 CE fija el mandato de los magistrados del Tribunal Constitucional en 9 a\xF1os, con renovaci\xF3n por terceras partes cada tres a\xF1os."},{temaId:3,pregunta:"\xBFCu\xE1l es la composici\xF3n m\xEDnima y m\xE1xima del Congreso de los Diputados seg\xFAn el art\xEDculo 68.1 CE?",opciones:["Entre 200 y 300 diputados","Entre 300 y 400 diputados","Exactamente 350 diputados fijos por Constituci\xF3n","Entre 350 y 450 diputados"],correcta:1,explicacion:"El art\xEDculo 68.1 CE establece que el Congreso se compone de un m\xEDnimo de 300 y un m\xE1ximo de 400 Diputados, elegidos por 4 a\xF1os."},{temaId:3,pregunta:"\xBFCu\xE1ntos Senadores se eligen, con car\xE1cter general, por cada provincia seg\xFAn el art\xEDculo 69.2 CE?",opciones:["Dos","Tres","Cuatro","Seis"],correcta:2,explicacion:"El art\xEDculo 69.2 CE dispone que en cada provincia se elegir\xE1n cuatro Senadores por sufragio universal, siendo el Senado la C\xE1mara de representaci\xF3n territorial."},{temaId:3,pregunta:"\xBFQu\xE9 requisitos exige el art\xEDculo 113 CE para la moci\xF3n de censura contra el Gobierno?",opciones:["Mayor\xEDa simple del Congreso y ning\xFAn candidato alternativo","Mayor\xEDa absoluta del Congreso, propuesta por al menos la d\xE9cima parte de los Diputados, incluyendo un candidato a la Presidencia","Mayor\xEDa de 2/3 del Senado","Aprobaci\xF3n conjunta de Congreso y Senado"],correcta:1,explicacion:"La moci\xF3n de censura exige mayor\xEDa absoluta del Congreso, debe proponerla al menos la d\xE9cima parte de los Diputados e incluir un candidato a la Presidencia del Gobierno (moci\xF3n de censura constructiva)."},{temaId:3,pregunta:"\xBFC\xF3mo se entiende otorgada la cuesti\xF3n de confianza planteada por el Presidente del Gobierno seg\xFAn el art\xEDculo 112 CE?",opciones:["Cuando la aprueba el Senado por mayor\xEDa absoluta","Cuando vota a favor la mayor\xEDa simple de los Diputados","Cuando lo decide el Rey","Nunca puede otorgarse, solo denegarse"],correcta:1,explicacion:"El art\xEDculo 112 CE establece que la confianza se entiende otorgada cuando vote a favor de la cuesti\xF3n de confianza la mayor\xEDa simple de los Diputados."},{temaId:3,pregunta:"En la sesi\xF3n de investidura, si no se alcanza la mayor\xEDa absoluta en la primera votaci\xF3n, \xBFqu\xE9 mayor\xEDa basta 48 horas despu\xE9s?",opciones:["Mayor\xEDa absoluta igualmente","Mayor\xEDa simple","Mayor\xEDa de dos tercios","Unanimidad"],correcta:1,explicacion:"El art\xEDculo 99.3 CE establece que, de no alcanzarse la mayor\xEDa absoluta, se repite la votaci\xF3n 48 horas despu\xE9s y basta la mayor\xEDa simple para otorgar la confianza."},{temaId:3,pregunta:"\xBFQui\xE9n refrenda, con car\xE1cter general, los actos del Rey seg\xFAn el art\xEDculo 64 CE?",opciones:["El Presidente del Tribunal Constitucional","El Presidente del Gobierno y, en su caso, los Ministros competentes","El Presidente del Congreso en todo caso","El Fiscal General del Estado"],correcta:1,explicacion:"El art\xEDculo 64 CE dispone que los actos del Rey ser\xE1n refrendados por el Presidente del Gobierno y, en su caso, por los Ministros competentes, siendo estos quienes asumen la responsabilidad de dichos actos."},{temaId:3,pregunta:"\xBFEn qu\xE9 plazo debe el Rey sancionar las leyes aprobadas por las Cortes Generales, seg\xFAn el art\xEDculo 91 CE?",opciones:["7 d\xEDas","15 d\xEDas","20 d\xEDas","30 d\xEDas"],correcta:1,explicacion:"El art\xEDculo 91 CE fija en quince d\xEDas el plazo en que el Rey sancionar\xE1 las leyes, las promulgar\xE1 y ordenar\xE1 su inmediata publicaci\xF3n."},{temaId:3,pregunta:"\xBFQui\xE9n puede proponer al Rey la disoluci\xF3n de las Cortes Generales seg\xFAn el art\xEDculo 115 CE?",opciones:["El Presidente del Gobierno, previa deliberaci\xF3n del Consejo de Ministros","Cualquier Ministro individualmente","El Presidente del Congreso por iniciativa propia","El Tribunal Constitucional"],correcta:0,explicacion:"El art\xEDculo 115 CE atribuye al Presidente del Gobierno, previa deliberaci\xF3n del Consejo de Ministros y bajo su exclusiva responsabilidad, la facultad de proponer la disoluci\xF3n, que no podr\xE1 presentarse mientras est\xE9 en tr\xE1mite una moci\xF3n de censura."},{temaId:3,pregunta:"Seg\xFAn el art\xEDculo 116 CE, \xBFqu\xE9 plazo m\xE1ximo tiene el estado de alarma declarado por el Gobierno sin autorizaci\xF3n del Congreso?",opciones:["15 d\xEDas","30 d\xEDas","60 d\xEDas","90 d\xEDas"],correcta:0,explicacion:"El estado de alarma se declara por el Gobierno mediante decreto en Consejo de Ministros por un plazo m\xE1ximo de 15 d\xEDas, dando cuenta al Congreso, sin cuya autorizaci\xF3n no puede prorrogarse."},{temaId:3,pregunta:"\xBFQui\xE9n nombra al Fiscal General del Estado seg\xFAn el art\xEDculo 124.4 CE?",opciones:["El Rey, a propuesta del Gobierno, o\xEDdo el Consejo General del Poder Judicial","El Congreso de los Diputados por mayor\xEDa absoluta","El Presidente del Tribunal Supremo","El propio Ministerio Fiscal, por elecci\xF3n interna"],correcta:0,explicacion:"El Fiscal General del Estado es nombrado por el Rey, a propuesta del Gobierno, o\xEDdo previamente el Consejo General del Poder Judicial."},{temaId:3,pregunta:"\xBFA qui\xE9nes legitima el art\xEDculo 162.1 a) CE para interponer un recurso de inconstitucionalidad?",opciones:["Cualquier ciudadano espa\xF1ol","El Presidente del Gobierno, el Defensor del Pueblo, 50 Diputados, 50 Senadores y los \xF3rganos ejecutivos o Asambleas de las CCAA","Solo el Ministerio Fiscal","\xDAnicamente los Jueces y Magistrados"],correcta:1,explicacion:"Est\xE1n legitimados para el recurso de inconstitucionalidad el Presidente del Gobierno, el Defensor del Pueblo, 50 Diputados, 50 Senadores, y los \xF3rganos colegiados ejecutivos de las CCAA y, en su caso, sus Asambleas."},{temaId:3,pregunta:"\xBFQu\xE9 mayor\xEDa exige, con car\xE1cter general, el art\xEDculo 167 CE para aprobar una reforma constitucional ordinaria?",opciones:["Mayor\xEDa absoluta de cada C\xE1mara","Mayor\xEDa de tres quintos de cada C\xE1mara","Mayor\xEDa de dos tercios de cada C\xE1mara","Unanimidad"],correcta:1,explicacion:"El procedimiento ordinario de reforma constitucional (art. 167 CE) exige la aprobaci\xF3n por una mayor\xEDa de tres quintos de cada una de las C\xE1maras."},{temaId:3,pregunta:"\xBFQu\xE9 procedimiento agravado de reforma constitucional exige el art\xEDculo 168 CE, y cu\xE1ndo se aplica?",opciones:["Solo mayor\xEDa simple, para cualquier reforma","Mayor\xEDa de 2/3, disoluci\xF3n de Cortes, ratificaci\xF3n por las nuevas C\xE1maras y refer\xE9ndum, cuando se afecta al T\xEDtulo Preliminar, al T\xEDtulo II o a los derechos fundamentales de la Secci\xF3n 1.\xAA del Cap\xEDtulo II del T\xEDtulo I","Se aplica siempre, sin excepci\xF3n, a cualquier art\xEDculo","Solo requiere refer\xE9ndum, sin intervenci\xF3n de las Cortes"],correcta:1,explicacion:"El art. 168 CE exige mayor\xEDa de 2/3 de cada C\xE1mara, disoluci\xF3n inmediata de las Cortes, ratificaci\xF3n por las nuevas C\xE1maras (tambi\xE9n por 2/3) y refer\xE9ndum, cuando la revisi\xF3n sea total o afecte al T\xEDtulo Preliminar, al T\xEDtulo II o a los derechos fundamentales del Cap\xEDtulo II, Secci\xF3n 1.\xAA del T\xEDtulo I."},{temaId:3,pregunta:"\xBFQu\xE9 \xF3rgano es, seg\xFAn el art\xEDculo 136 CE, el supremo \xF3rgano fiscalizador de las cuentas y de la gesti\xF3n econ\xF3mica del Estado?",opciones:["El Consejo de Estado","El Tribunal de Cuentas","El Tribunal Constitucional","La Comisi\xF3n General de Secretarios de Estado"],correcta:1,explicacion:"El Tribunal de Cuentas es el supremo \xF3rgano fiscalizador de las cuentas y la gesti\xF3n econ\xF3mica del Estado y del sector p\xFAblico, y depende directamente de las Cortes Generales."},{temaId:3,pregunta:"\xBFQu\xE9 principio, seg\xFAn el art\xEDculo 117.5 CE, constituye la base de la organizaci\xF3n y funcionamiento de los Tribunales?",opciones:["El principio de oportunidad","El principio de unidad jurisdiccional","El principio de doble instancia","El principio de jerarqu\xEDa militar"],correcta:1,explicacion:"El art\xEDculo 117.5 CE establece el principio de unidad jurisdiccional como base de la organizaci\xF3n y funcionamiento de los Tribunales, con la jurisdicci\xF3n militar limitada al \xE1mbito estrictamente castrense."}],tv=Ae.map(e=>{let a={1:"Conjunto de normas que regulan la convivencia social y son de cumplimiento obligatorio, dictadas y garantizadas por el poder p\xFAblico.",2:"Norma suprema del ordenamiento jur\xEDdico espa\xF1ol, aprobada en 1978, compuesta por un T\xEDtulo Preliminar y diez t\xEDtulos m\xE1s.",3:"Regula la Corona, las Cortes Generales, el Gobierno y la Administraci\xF3n, y las relaciones entre los poderes del Estado.",4:"Uni\xF3n de 27 Estados europeos con instituciones propias (Comisi\xF3n, Consejo, Parlamento, Tribunal de Justicia) y competencias cedidas por los Estados miembros.",5:"Conjunto de \xF3rganos superiores y directivos, centrales y perif\xE9ricos, que dirigen y gestionan la actividad de la Administraci\xF3n del Estado.",6:"Personas vinculadas a una Administraci\xF3n P\xFAblica por una relaci\xF3n estatutaria regulada por el Derecho Administrativo.",7:"Departamento ministerial responsable de la seguridad ciudadana, instituciones penitenciarias, tr\xE1fico y protecci\xF3n civil, entre otros.",8:"\xD3rgano superior que ejerce la jefatura de la Polic\xEDa Nacional y dirige sus servicios centrales y perif\xE9ricos.",9:"Norma que regula los principios b\xE1sicos de actuaci\xF3n, estatuto y organizaci\xF3n de las Fuerzas y Cuerpos de Seguridad en Espa\xF1a.",10:"R\xE9gimen que permite a los ciudadanos de la UE y del EEE entrar, circular y residir libremente en Espa\xF1a.",11:"Conjunto de conductas tipificadas como infracci\xF3n por incumplir la normativa de extranjer\xEDa, con sanciones que van de leves a muy graves.",12:"Estatuto jur\xEDdico (asilo y protecci\xF3n subsidiaria) que ampara a personas perseguidas que no pueden regresar a su pa\xEDs de origen.",13:"Actividad regulada por la que empresas y personal habilitado prestan servicios de vigilancia y protecci\xF3n complementarios a la seguridad p\xFAblica.",14:"Norma que regula las actuaciones de las Fuerzas y Cuerpos de Seguridad para garantizar la seguridad ciudadana, incluida la identificaci\xF3n y los cacheos.",15:"Instalaciones esenciales cuya interrupci\xF3n tendr\xEDa un impacto grave en servicios b\xE1sicos, protegidas mediante planes espec\xEDficos.",16:"Parte del Derecho Penal que estudia los principios comunes a todos los delitos: concepto de delito, autor\xEDa, responsabilidad y penas.",17:"Parte del Derecho Penal que estudia cada delito en particular (homicidio, lesiones, delitos contra la libertad, etc.).",18:"Delitos que atacan la propiedad o el orden econ\xF3mico: hurto, robo, estafa, apropiaci\xF3n indebida, entre otros.",19:"Delitos que alteran la paz social y el normal funcionamiento de las instituciones: des\xF3rdenes p\xFAblicos, atentado, resistencia.",20:"Delitos cometidos mediante sistemas inform\xE1ticos: acceso il\xEDcito, da\xF1os inform\xE1ticos, estafas online, entre otros.",21:"Rama del Derecho que regula el proceso penal: c\xF3mo se investiga, enjuicia y sanciona un delito.",22:"Norma que reconoce derechos comunes a toda v\xEDctima de un delito, con independencia de si se ha identificado al autor.",23:"Marco normativo que establece medidas integrales (prevenci\xF3n, protecci\xF3n, asistencia) frente a la violencia ejercida sobre la mujer por su pareja o expareja.",24:"Disciplina que busca promover la seguridad y salud de los trabajadores mediante la identificaci\xF3n y evaluaci\xF3n de riesgos.",25:"Conjunto de normas (Ley 31/1995 y su desarrollo reglamentario) que establecen las obligaciones en materia preventiva.",26:"Derecho fundamental que garantiza el control de las personas sobre sus datos personales y su tratamiento l\xEDcito.",27:"Derechos inherentes a toda persona por su dignidad humana, reconocidos internacionalmente desde 1948.",28:"Proceso de interconexi\xF3n econ\xF3mica, social y cultural mundial, y los movimientos sociales que lo cuestionan.",29:"Disposiciones aprendidas hacia personas, ideas o situaciones, con componentes cognitivo, afectivo y conductual.",30:"Principios que gu\xEDan el comportamiento correcto en la convivencia: libertad, igualdad, solidaridad, tolerancia.",31:"Desplazamiento de personas de un lugar a otro por motivos econ\xF3micos, sociales, pol\xEDticos o de conflicto.",32:"Rama de la geograf\xEDa que estudia la relaci\xF3n entre las poblaciones humanas y el territorio que habitan.",33:"Situaci\xF3n de ausencia de riesgo o da\xF1o que permite el libre ejercicio de derechos y libertades.",34:"Estado de dependencia f\xEDsica y/o psicol\xF3gica generado por el consumo repetido de una sustancia psicoactiva.",35:"Modelo de desarrollo que satisface las necesidades actuales sin comprometer las de las generaciones futuras.",36:"Parte de la ling\xFC\xEDstica que estudia la estructura y combinaci\xF3n correcta de las palabras y oraciones.",37:"Conjunto de normas que regulan la escritura correcta de una lengua: acentuaci\xF3n, puntuaci\xF3n y uso de letras.",38:"Software base que gestiona los recursos del hardware y permite ejecutar programas (Windows, Linux, macOS...).",39:"Conjunto de dispositivos y protocolos que permiten la comunicaci\xF3n e intercambio de datos entre equipos.",40:"Proceso de obtenci\xF3n, an\xE1lisis y difusi\xF3n de informaci\xF3n relevante para la toma de decisiones de seguridad.",41:"Actividad delictiva desarrollada mediante el uso de tecnolog\xEDas de la informaci\xF3n y comunicaci\xF3n.",42:"Armas que emplean la energ\xEDa de una sustancia qu\xEDmica (p\xF3lvora) para lanzar un proyectil.",43:"Veh\xEDculo autorizado a circular con excepciones a las normas generales cuando presta un servicio de urgencia.",44:"Conjunto de t\xE9cnicas y precauciones que debe observar quien conduce un veh\xEDculo prioritario en servicio de emergencia.",45:"Conjunto de medidas preventivas orientadas a reducir riesgos laborales asociados a la conducci\xF3n y la v\xEDa p\xFAblica."};return{temaId:e.id,frente:e.titulo,dorso:a[e.id]||"Concepto clave del tema."}}),ov=[{temaId:1,frente:"Derecho natural vs. Derecho positivo",dorso:"El natural es inmutable y universal, fundado en la raz\xF3n y la naturaleza humana. El positivo lo crea el hombre, rige en un momento y lugar concretos, y puede cambiar."},{temaId:1,frente:"Derecho objetivo vs. Derecho subjetivo",dorso:"El objetivo es el conjunto de normas que rige una sociedad. El subjetivo es la facultad del individuo para actuar en defensa de sus propios intereses (p. ej. el derecho a la propiedad)."},{temaId:1,frente:"Fuentes del Derecho (art. 1 C\xF3digo Civil)",dorso:"La Ley, la costumbre y los principios generales del derecho, por ese orden de aplicaci\xF3n."},{temaId:1,frente:"Caracteres externos de la norma jur\xEDdica",dorso:"Bilateralidad, imperatividad (obligatoriedad), coercitividad (coactividad), generalidad y legitimidad."},{temaId:1,frente:"Ley org\xE1nica: mayor\xEDa necesaria para su aprobaci\xF3n (art. 81 CE)",dorso:"Mayor\xEDa absoluta del Congreso, en votaci\xF3n final sobre el conjunto del proyecto."},{temaId:1,frente:"Decreto-ley: plazo para su convalidaci\xF3n por el Congreso (art. 86 CE)",dorso:"30 d\xEDas desde su promulgaci\xF3n; el Congreso debe pronunciarse sobre su convalidaci\xF3n o derogaci\xF3n."},{temaId:1,frente:"Vacatio legis (art. 2.1 C\xF3digo Civil)",dorso:"Las leyes entran en vigor a los 20 d\xEDas de su completa publicaci\xF3n en el BOE, salvo que dispongan otro plazo."},{temaId:1,frente:"Derogaci\xF3n expresa vs. t\xE1cita",dorso:"Expresa: el legislador lo dice expl\xEDcitamente. T\xE1cita: la nueva ley contradice o sustituye a la anterior sin decirlo."},{temaId:1,frente:"Tipos de mayor\xEDas (Constituci\xF3n)",dorso:"Absoluta: mitad + uno de todos los miembros del \xF3rgano. Simple: m\xE1s votos a favor que en contra entre los presentes. Cualificada: 2/3, 3/5, etc. de los miembros legales."},{temaId:1,frente:"Personalidad jur\xEDdica (art. 30 C\xF3digo Civil)",dorso:"Se adquiere en el momento del nacimiento con vida, tras el entero desprendimiento del seno materno."},{temaId:1,frente:"Capacidad jur\xEDdica vs. capacidad de obrar",dorso:"Jur\xEDdica: aptitud para ser titular de derechos, se tiene desde que se es persona. De obrar: posibilidad de ejercerlos por uno mismo, se adquiere normalmente con la mayor\xEDa de edad."},{temaId:1,frente:"Emancipaci\xF3n por concesi\xF3n de quienes ejercen la patria potestad",dorso:"Requiere que el menor tenga 16 a\xF1os cumplidos y preste su co
