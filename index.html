nsentimiento (art. 241 CC)."},{temaId:1,frente:"Nacionalidad de origen: ius sanguinis vs. ius soli",dorso:"Ius sanguinis: por ser hijo de padre o madre espa\xF1ola. Ius soli: por haber nacido en Espa\xF1a en determinados supuestos (p. ej. padres extranjeros sin nacionalidad)."},{temaId:1,frente:"Nacionalidad por residencia: plazo general y reducidos",dorso:"10 a\xF1os con car\xE1cter general; 5 a\xF1os para refugiados; 2 a\xF1os para iberoamericanos, Andorra, Filipinas, Guinea Ecuatorial, Portugal y sefard\xEDes; 1 a\xF1o en supuestos especiales."},{temaId:1,frente:"Domicilio de las personas naturales (art. 40 C\xF3digo Civil)",dorso:"El lugar de su residencia habitual y, en su caso, el que determine la Ley de Enjuiciamiento Civil."},{temaId:1,frente:"Vecindad civil",dorso:"Determina qu\xE9 legislaci\xF3n civil (com\xFAn o foral) es aplicable a cada espa\xF1ol; es distinta de la vecindad administrativa (ligada al padr\xF3n municipal)."},{temaId:5,frente:"Ley 40/2015",dorso:"Ley de R\xE9gimen Jur\xEDdico del Sector P\xFAblico: regula la organizaci\xF3n y funcionamiento de la AGE, incluida la Administraci\xF3n institucional y perif\xE9rica."},{temaId:5,frente:"Principios del art. 103 CE para la Administraci\xF3n P\xFAblica",dorso:"Eficacia, jerarqu\xEDa, descentralizaci\xF3n, desconcentraci\xF3n y coordinaci\xF3n, con sometimiento pleno a la ley y al Derecho."},{temaId:5,frente:"\xD3rganos superiores vs. directivos de la AGE",dorso:"Superiores: Ministros y Secretarios de Estado. Directivos: Subsecretarios, Secretarios Generales, Secretarios Generales T\xE9cnicos, Directores Generales y Subdirectores Generales."},{temaId:5,frente:"Rango del Delegado del Gobierno en una Comunidad Aut\xF3noma",dorso:"Rango de Subsecretario."},{temaId:5,frente:"Nivel del Subdelegado del Gobierno en una provincia",dorso:"Nivel de Subdirector General; depende del Delegado del Gobierno."},{temaId:5,frente:"CICAPE",dorso:"Comisi\xF3n Interministerial de Coordinaci\xF3n de la Administraci\xF3n Perif\xE9rica del Estado: coordina la actuaci\xF3n perif\xE9rica con los distintos ministerios."},{temaId:5,frente:"Ley 50/1997",dorso:"Ley del Gobierno: desarrolla el r\xE9gimen jur\xEDdico del Gobierno previsto en los art\xEDculos 97 y 98 de la Constituci\xF3n."},{temaId:5,frente:"Tres principios del funcionamiento del Gobierno",dorso:"Direcci\xF3n presidencial, colegialidad (responsabilidad solidaria) y departamental (autonom\xEDa de cada Ministro)."},{temaId:5,frente:"Composici\xF3n del Gobierno (art. 1 Ley 50/1997)",dorso:"El Presidente, los Vicepresidentes (en su caso) y los Ministros."},{temaId:5,frente:"Deliberaciones del Consejo de Ministros",dorso:"Son secretas."},{temaId:5,frente:"Deliberaciones de la Comisi\xF3n General de Secretarios de Estado y Subsecretarios",dorso:"Son reservadas (no 'secretas', a diferencia del Consejo de Ministros)."},{temaId:5,frente:"Gobierno en funciones: qu\xE9 NO puede hacer su Presidente",dorso:"No puede proponer al Rey la disoluci\xF3n de las C\xE1maras ni de las Cortes Generales, entre otras limitaciones del art. 21 de la Ley 50/1997."},{temaId:5,frente:"Delegaciones legislativas durante el Gobierno en funciones",dorso:"Quedan en suspenso durante todo el tiempo que el Gobierno permanezca en funciones tras la celebraci\xF3n de elecciones."},{temaId:6,frente:"TREBEP",dorso:"Real Decreto Legislativo 5/2015, texto refundido de la Ley del Estatuto B\xE1sico del Empleado P\xFAblico; sustituy\xF3 a la Ley 7/2007."},{temaId:6,frente:"Clases de empleados p\xFAblicos (art. 8 TREBEP)",dorso:"Funcionarios de carrera, funcionarios interinos, personal laboral (fijo/indefinido/temporal) y personal eventual."},{temaId:6,frente:"Grupos de clasificaci\xF3n profesional",dorso:"A1 y A2 (t\xEDtulo universitario de Grado), B (T\xE9cnico Superior), C1 (Bachillerato) y C2 (Graduado en Educaci\xF3n Secundaria)."},{temaId:6,frente:"Carrera horizontal vs. vertical",dorso:"Horizontal: progresi\xF3n de grado/categor\xEDa sin cambiar de puesto. Vertica const mergeStorageData = (local, drive) => {
  let merged = { ...local };
  for (let key in drive) {
    if (merged[key] === undefined) {
      merged[key] = drive[key];
    } else {
      let lVal = merged[key];
      let dVal = drive[key];
      if (typeof lVal === "object" && lVal !== null && typeof dVal === "object" && dVal !== null) {
        if (Array.isArray(lVal) && Array.isArray(dVal)) {
          let map = new Map();
          lVal.forEach(item => { if (item && item.id) map.set(item.id, item); });
          dVal.forEach(item => { if (item && item.id) map.set(item.id, item); });
          if (map.size > 0) {
            merged[key] = Array.from(map.values());
          } else {
            let set = new Set(lVal.map(x => JSON.stringify(x)));
            dVal.forEach(x => set.add(JSON.stringify(x)));
            merged[key] = Array.from(set).map(x => JSON.parse(x));
          }
        } else {
          merged[key] = { ...lVal, ...dVal };
        }
      } else {
        merged[key] = lVal || dVal;
      }
    }
  }
  return merged;
};

@import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

.app-root {
  --bg: #101a30;
  --surface: #172342;
  --surface-2: #1e2c50;
  --paper: #f2eee3;
  --ink: #1b2a4a;
  --gold: #b68d40;
  --gold-bright: #d8b471;
  --red: #a23b3b;
  --green: #3e7c59;
  --muted: #8b93a8;
  font-family: 'Public Sans', sans-serif;
  background: var(--bg);
  color: var(--paper);
  min-height: 100vh;
  padding-bottom: 2rem;
}
.app-root * { box-sizing: border-box; }
.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:1rem; color: var(--muted); }
.seal-spin { width:40px; height:40px; border-radius:50%; border:3px solid var(--gold); border-top-color: transparent; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.topbar { display:flex; align-items:center; justify-content:space-between; padding:1.1rem 1.25rem; border-bottom:1px solid rgba(214,188,138,0.15); background: linear-gradient(180deg, var(--surface), var(--bg)); }
.topbar-brand { display:flex; align-items:center; gap:0.6rem; color: var(--gold-bright); }
.brand-title { font-family:'Roboto Slab', serif; font-weight:700; font-size:1.02rem; letter-spacing:0.01em; color:var(--paper); }
.brand-sub { font-size:0.72rem; color: var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
.topbar-id { font-family:'IBM Plex Mono', monospace; font-size:0.75rem; color: var(--gold-bright); border:1px solid rgba(214,188,138,0.35); padding:0.25rem 0.6rem; border-radius:3px; }

.tabs { display:flex; gap:0.15rem; padding:0 1rem; border-bottom:1px solid rgba(214,188,138,0.12); overflow-x:auto; }
.tab { display:flex; align-items:center; gap:0.4rem; padding:0.7rem 0.9rem; background:transparent; border:none; color: var(--muted); font-size:0.85rem; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; font-family:'Public Sans',sans-serif; }
.tab:hover { color: var(--paper); }
.tab-active { color: var(--gold-bright); border-bottom-color: var(--gold); }

.content { padding:1.1rem; max-width:760px; margin:0 auto; }
.stack { display:flex; flex-direction:column; gap:1rem; }

/* ID card */
.id-card { background: var(--paper); color: var(--ink); border-radius:10px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.35); position:relative; }
.id-card-stripe { height:8px; background: repeating-linear-gradient(45deg, var(--ink) 0 10px, var(--gold) 10px 20px); }
.id-card-body { display:flex; align-items:center; gap:1rem; padding:1.1rem 1.2rem; }
.id-photo { width:56px; height:56px; border-radius:50%; background: var(--ink); color: var(--paper); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.id-info { flex:1; min-width:0; }
.id-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:#6b7280; }
.id-nombre { font-family:'Roboto Slab', serif; font-weight:700; font-size:1.15rem; cursor:pointer; }
.id-edit { display:flex; gap:0.4rem; align-items:center; }
.id-edit input { font-family:'Roboto Slab', serif; font-size:1.05rem; padding:0.2rem 0.4rem; border:1px solid var(--ink); border-radius:4px; }
.id-expediente { font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:#6b7280; margin-top:0.15rem; }
.id-seal { display:flex; flex-direction:column; align-items:center; gap:0.25rem; flex-shrink:0; }
.seal-ring { width:56px; height:56px; border-radius:50%; border:3px dashed var(--red); display:flex; align-items:center; justify-content:center; transform: rotate(-8deg); color: var(--red); font-family:'Roboto Slab', serif; font-weight:700; font-size:0.95rem; }
.id-seal-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.05em; color:#6b7280; text-align:center; max-width:70px; }

.grid-stats { display:grid; grid-template-columns:repeat(2, 1fr); gap:0.7rem; }
@media (min-width:520px) { .grid-stats { grid-template-columns:repeat(4, 1fr); } }
.stat-card { background: var(--surface); border:1px solid rgba(214,188,138,0.12); border-radius:8px; padding:0.85rem; text-align:center; }
